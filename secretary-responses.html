<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secretary Responses — Sams Construction</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F9FAFB;color:#111827;padding:20px 16px;}
.container{max-width:700px;margin:0 auto;}
.header{background:#111827;color:#fff;padding:20px 24px;margin-bottom:20px;border-radius:14px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:18px;font-weight:800;}
.header p{font-size:12px;color:#9CA3AF;margin-top:2px;}
.btn{padding:8px 16px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}
.card{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #E5E7EB;margin-bottom:12px;cursor:pointer;}
.card:hover{border-color:#2563EB;background:#FAFBFF;}
.card-header{display:flex;justify-content:space-between;align-items:center;}
.card-name{font-weight:700;font-size:15px;}
.card-date{font-size:12px;color:#9CA3AF;margin-top:2px;}
.card-count{font-size:12px;color:#6B7280;margin-top:4px;}
.badge{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.empty{background:#fff;border-radius:12px;padding:40px;text-align:center;border:1px solid #E5E7EB;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.detail{display:none;}
.detail.active{display:block;}
.list{display:block;}
.list.hidden{display:none;}
.back-btn{padding:8px 16px;background:#F3F4F6;color:#374151;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:16px;}
.q-card{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #F3F4F6;margin-bottom:10px;}
.q-label{font-size:11px;font-weight:700;color:#2563EB;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.q-answer{font-size:14px;color:#111827;line-height:1.6;white-space:pre-wrap;}
.sub-header{background:#111827;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.sub-header .name{font-size:16px;font-weight:700;color:#fff;}
.sub-header .date{font-size:12px;color:#9CA3AF;}
.spinner{width:32px;height:32px;border:3px solid #E5E7EB;border-top-color:#2563EB;border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.refresh-btn{padding:6px 12px;background:#F3F4F6;color:#374151;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>📝 Secretary Responses</h1>
      <p>Sams Construction Services LTD — Dump Job Questionnaire</p>
    </div>
    <button class="refresh-btn" onclick="loadResponses()">↻ Refresh</button>
  </div>

  <div id="loading"><div class="spinner"></div></div>

  <div id="list-view" class="list hidden"></div>
  <div id="detail-view" class="detail"></div>
</div>

<script>
const SUPABASE_URL = 'https://bxrqnisgplsgnzxzugbd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4cnFuaXNncGxzZ256eHp1Z2JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1ODkwNzYsImV4cCI6MjA5NjE2NTA3Nn0.xtaxorZdkFBn-RkUGnPg9MU6bkIW1fEionyxFVxO1VI';

const QUESTIONS = {
  q1_pricing_by_material: 'Precios por material y tamano de contenedor',
  q2_mixed_material: 'Material mezclado — como se cobra',
  q3_overweight_charge: 'Cargo por sobrepeso',
  q4_ticket_numbering: 'Sistema de numeracion de tickets',
  q5_ticket_storage: 'Donde guarda los tickets de papel',
  q6_tickets_per_day: 'Cuantos tickets por dia',
  q7_client_info_needed: 'Informacion que necesita del cliente nuevo',
  q8_repeat_client_info: 'Clientes frecuentes — guarda su informacion',
  q9_rental_plus_dump: 'Renta de maquina + dump job al mismo tiempo',
  q10_zelle_number: 'Numero de Zelle para dump jobs',
  q11_zelle_to_driver: 'Problema de Zelle enviado al chofer',
  q12_verify_payment: 'Como verifica si un cliente ya pago',
  q13_total_debt: 'Deuda total de clientes en dump jobs',
  q14_collections_process: 'Proceso de cobranza para dump jobs',
  q15_permit_info_needed: 'Informacion necesaria para sacar permiso',
  q16_permit_duration: 'Duracion del permiso de calle',
  q17_permit_storage: 'Donde guarda los numeros de permiso',
  q18_permit_problems: 'Problemas con permisos o multas',
  q19_receipt_data: 'Datos del recibo de American Recycling que anota',
  q20_receipt_storage: 'Donde guarda las fotos de los recibos',
  q21_recycling_cost: 'Cuanto cobra American Recycling a Sams',
  q22_dump_location: 'Lugares donde van los choferes a dumpear',
  q23_urgent_job: 'Que pasa con trabajos urgentes sin chofer disponible',
  q24_container_count: 'Contenedores disponibles vs en uso actualmente',
  q25_container_duration: 'Cuanto tiempo deja el cliente el contenedor en obra',
  q26_portal_info: 'Info mas importante en el portal del cliente',
  q27_invoice_method: 'Como envia la factura al cliente',
  q28_signature_photo: 'Firma del cliente — se toma foto',
  q29_top_problems: 'Los 3 mayores problemas del proceso actual',
  q30_one_tool: 'La herramienta mas importante que necesita el nuevo sistema',
};

let allResponses = [];

function isAnswered(val) {
  return val && val !== 'Sin respuesta' && val.trim() !== 'Sin respuesta Sin respuesta' && val.trim() !== '';
}

async function loadResponses() {
  document.getElementById('loading').style.display='block';
  document.getElementById('list-view').classList.add('hidden');
  document.getElementById('detail-view').classList.remove('active');

  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/secretary_questionnaire?order=created_at.desc', {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
    });
    const data = await res.json();
    allResponses = (data || []).filter(r => r.name !== 'TEST');
    renderList();
  } catch(e) {
    document.getElementById('loading').style.display='none';
    document.getElementById('list-view').innerHTML='<div class="empty"><p style="color:#EF4444">Error loading responses. Please refresh.</p></div>';
    document.getElementById('list-view').classList.remove('hidden');
  }
}

function renderList() {
  document.getElementById('loading').style.display='none';
  document.getElementById('detail-view').classList.remove('active');
  const listEl = document.getElementById('list-view');
  listEl.classList.remove('hidden');

  if (allResponses.length === 0) {
    listEl.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><h3 style="font-size:18px;font-weight:700;margin-bottom:8px;">No hay respuestas aun</h3><p style="font-size:14px;color:#9CA3AF;margin-bottom:16px;">Cuando la secretaria envie el cuestionario, sus respuestas apareceran aqui automaticamente.</p><a class="btn" href="https://samsoffice.github.io/Sams-rental/secretary-questions.html" target="_blank">Abrir Cuestionario</a></div>';
    return;
  }

  listEl.innerHTML = '<div style="font-size:13px;color:#6B7280;margin-bottom:12px;">' + allResponses.length + ' respuesta(s) recibida(s). Tap para ver detalles.</div>' +
    allResponses.map((r,i) => {
      const answered = Object.keys(QUESTIONS).filter(k => isAnswered(r[k])).length;
      const pct = Math.round((answered / Object.keys(QUESTIONS).length) * 100);
      return '<div class="card" onclick="showDetail(' + i + ')">' +
        '<div class="card-header">' +
        '<div><div class="card-name">' + (r.name || 'Secretaria') + '</div>' +
        '<div class="card-date">' + (r.submitted_at || r.created_at || '') + '</div>' +
        '<div class="card-count">' + answered + ' de ' + Object.keys(QUESTIONS).length + ' preguntas respondidas (' + pct + '%)</div></div>' +
        '<span class="badge">✓ Ver →</span></div></div>';
    }).join('');
}

function showDetail(idx) {
  const r = allResponses[idx];
  const answered = Object.entries(QUESTIONS).filter(([k]) => isAnswered(r[k]));
  const unanswered = Object.entries(QUESTIONS).filter(([k]) => !isAnswered(r[k]));

  document.getElementById('list-view').classList.add('hidden');
  const detailEl = document.getElementById('detail-view');
  detailEl.classList.add('active');

  detailEl.innerHTML =
    '<button class="back-btn" onclick="renderList()">← Volver a todas las respuestas</button>' +
    '<div class="sub-header">' +
    '<div><div class="name">' + (r.name || 'Secretaria') + '</div><div class="date">Enviado: ' + (r.submitted_at || r.created_at || '') + '</div></div>' +
    '<span class="badge">' + answered.length + ' respuestas</span></div>' +

    (answered.length > 0 ? '<div style="font-size:12px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">✅ Preguntas Respondidas</div>' +
    answered.map(([k, label]) =>
      '<div class="q-card"><div class="q-label">' + label + '</div><div class="q-answer">' + (r[k] || '') + '</div></div>'
    ).join('') : '') +

    (unanswered.length > 0 ? '<div style="font-size:12px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;margin:16px 0 10px;">⬜ Sin Respuesta</div>' +
    unanswered.map(([k, label]) =>
      '<div class="q-card" style="opacity:0.5"><div class="q-label">' + label + '</div><div class="q-answer" style="color:#9CA3AF;font-style:italic;">Sin respuesta</div></div>'
    ).join('') : '');
}

loadResponses();
</script>
</body>
</html>

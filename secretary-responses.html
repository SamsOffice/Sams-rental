<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secretary Responses — Sams Construction</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F9FAFB;color:#111827;padding:20px 16px;}
.container{max-width:700px;margin:0 auto;}
.header{background:#111827;color:#fff;padding:20px 24px;margin-bottom:20px;border-radius:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.header h1{font-size:18px;font-weight:800;}
.header p{font-size:12px;color:#9CA3AF;margin-top:2px;}
.btn{padding:8px 16px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}
.card{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #E5E7EB;margin-bottom:12px;cursor:pointer;}
.card:hover{border-color:#2563EB;}
.badge{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.spinner{width:32px;height:32px;border:3px solid #E5E7EB;border-top-color:#2563EB;border-radius:50%;animation:spin 0.8s linear infinite;margin:60px auto;display:block;}
@keyframes spin{to{transform:rotate(360deg);}}
.q-card{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #F3F4F6;margin-bottom:10px;}
.q-label{font-size:11px;font-weight:700;color:#2563EB;text-transform:uppercase;margin-bottom:4px;}
.q-answer{font-size:14px;color:#111827;line-height:1.6;white-space:pre-wrap;}
.back-btn{padding:8px 16px;background:#F3F4F6;color:#374151;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:16px;display:inline-block;}
.sub-header{background:#111827;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:10px 0 8px;margin-top:8px;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>📝 Secretary Responses</h1>
      <p>Sams Construction — Dump Job Questionnaire</p>
    </div>
    <button class="btn" onclick="loadResponses()">↻ Refresh</button>
  </div>
  <div id="app"><div class="spinner"></div></div>
</div>

<script>
const URL2 = 'https://bxrqnisgplsgnzxzugbd.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4cnFuaXNncGxzZ256eHp1Z2JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1ODkwNzYsImV4cCI6MjA5NjE2NTA3Nn0.xtaxorZdkFBn-RkUGnPg9MU6bkIW1fEionyxFVxO1VI';

var QUESTIONS = {
  q1_pricing_by_material:'Precios por material y tamano',
  q2_mixed_material:'Material mezclado — como se cobra',
  q3_overweight_charge:'Cargo por sobrepeso',
  q4_ticket_numbering:'Sistema de numeracion de tickets',
  q5_ticket_storage:'Donde guarda los tickets de papel',
  q6_tickets_per_day:'Cuantos tickets por dia',
  q7_client_info_needed:'Informacion que necesita del cliente nuevo',
  q8_repeat_client_info:'Clientes frecuentes — guarda su info',
  q9_rental_plus_dump:'Renta + dump job al mismo tiempo',
  q10_zelle_number:'Numero de Zelle para dump jobs',
  q11_zelle_to_driver:'Problema de Zelle enviado al chofer',
  q12_verify_payment:'Como verifica si un cliente ya pago',
  q13_total_debt:'Deuda total de clientes en dump jobs',
  q14_collections_process:'Proceso de cobranza',
  q15_permit_info_needed:'Informacion para sacar permiso',
  q16_permit_duration:'Duracion del permiso de calle',
  q17_permit_storage:'Donde guarda los numeros de permiso',
  q18_permit_problems:'Problemas con permisos o multas',
  q19_receipt_data:'Datos del recibo de American Recycling',
  q20_receipt_storage:'Donde guarda las fotos de los recibos',
  q21_recycling_cost:'Costo de American Recycling a Sams',
  q22_dump_location:'Lugares donde van a dumpear',
  q23_urgent_job:'Que pasa con trabajos urgentes',
  q24_container_count:'Contenedores disponibles vs en uso',
  q25_container_duration:'Tiempo del contenedor en obra',
  q26_portal_info:'Info mas importante en portal del cliente',
  q27_invoice_method:'Como envia la factura',
  q28_signature_photo:'Firma del cliente — se toma foto',
  q29_top_problems:'Los 3 mayores problemas actuales',
  q30_one_tool:'Herramienta mas importante para el nuevo sistema',
};

var allData = [];

function ok(v){ return v && v !== 'Sin respuesta' && v.trim() !== 'Sin respuesta Sin respuesta' && v.trim() !== ''; }

async function loadResponses(){
  document.getElementById('app').innerHTML = '<div class="spinner"></div>';
  try {
    var res = await fetch(URL2+'/rest/v1/secretary_questionnaire?order=created_at.desc',{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    var data = await res.json();
    allData = (data||[]).filter(function(r){return r.name!=='TEST';});
    showList();
  } catch(e) {
    document.getElementById('app').innerHTML = '<div style="background:#FEF2F2;border:1px solid #FCA5A5;border-radius:12px;padding:24px;text-align:center;"><div style="font-size:14px;color:#991B1B;font-weight:700;margin-bottom:8px;">Error loading responses</div><div style="font-size:13px;color:#991B1B;">'+e.message+'</div><button class="btn" onclick="loadResponses()" style="margin-top:12px;">Try Again</button></div>';
  }
}

function showList(){
  if(allData.length===0){
    document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:12px;">📝</div><h3 style="font-size:18px;font-weight:700;margin-bottom:8px;">No responses yet</h3><p style="font-size:14px;color:#9CA3AF;margin-bottom:16px;">When the secretary submits, her answers will appear here.</p><a class="btn" href="secretary-questions.html" target="_blank">Open Questionnaire</a></div>';
    return;
  }
  var html = '<div style="font-size:13px;color:#6B7280;margin-bottom:12px;">'+allData.length+' response(s) received. Tap to view details.</div>';
  allData.forEach(function(r,i){
    var answered = Object.keys(QUESTIONS).filter(function(k){return ok(r[k]);}).length;
    var pct = Math.round(answered/Object.keys(QUESTIONS).length*100);
    html += '<div class="card" onclick="showDetail('+i+')"><div style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:700;font-size:15px;">'+(r.name||'Secretaria')+'</div><div style="font-size:12px;color:#9CA3AF;margin-top:2px;">'+(r.submitted_at||r.created_at||'')+'</div><div style="font-size:12px;color:#6B7280;margin-top:4px;">'+answered+' of '+Object.keys(QUESTIONS).length+' questions answered ('+pct+'%)</div></div><span class="badge">View →</span></div></div>';
  });
  document.getElementById('app').innerHTML = html;
}

function showDetail(idx){
  var r = allData[idx];
  var answered = Object.entries(QUESTIONS).filter(function(e){return ok(r[e[0]]);});
  var unanswered = Object.entries(QUESTIONS).filter(function(e){return !ok(r[e[0]]);});

  var html = '<button class="back-btn" onclick="showList()">← Back to all responses</button>';
  html += '<div class="sub-header"><div><div style="font-size:16px;font-weight:700;color:#fff;">'+(r.name||'Secretaria')+'</div><div style="font-size:12px;color:#9CA3AF;">Submitted: '+(r.submitted_at||r.created_at||'')+'</div></div><span class="badge">'+answered.length+' answered</span></div>';

  if(answered.length>0){
    html += '<div class="section-title" style="color:#065F46;">✅ Answered Questions</div>';
    answered.forEach(function(e){
      html += '<div class="q-card"><div class="q-label">'+e[1]+'</div><div class="q-answer">'+r[e[0]]+'</div></div>';
    });
  }
  if(unanswered.length>0){
    html += '<div class="section-title" style="color:#9CA3AF;">⬜ Not Answered</div>';
    unanswered.forEach(function(e){
      html += '<div class="q-card" style="opacity:0.5"><div class="q-label">'+e[1]+'</div><div class="q-answer" style="color:#9CA3AF;font-style:italic;">No answer</div></div>';
    });
  }
  document.getElementById('app').innerHTML = html;
}

loadResponses();
</script>
</body>
</html>

// ── SCHEDULE TAB ──
function ScheduleTab({rentals}){
  const active=rentals.filter(r=>r.rental_status==='active');
  const today=new Date();
  const cal=Array.from({length:30},(_,i)=>{const d=new Date(today);d.setDate(d.getDate()+i);return d;});
  const forDay=date=>{const ds=date.toISOString().slice(0,10);return active.filter(r=>ds>=r.start_date&&ds<=r.due_date);};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #F3F4F6',overflow:'hidden'}}>
        <div style={{background:'#111827',padding:'14px 18px'}}><h3 style={{fontSize:14,fontWeight:700,color:'#fff'}}>📋 Equipment Currently Out</h3></div>
        <div style={{padding:16,display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:10}}>
          {active.length===0?<div style={{padding:24,textAlign:'center',color:'#9CA3AF'}}>No equipment out</div>
          :active.map(r=>{const d=days(r.due_date);return<div key={r.id} style={{background:'#F9FAFB',borderRadius:8,padding:12,border:'1px solid '+(d<0?'#FCA5A5':d<=2?'#FDE68A':'#E5E7EB')}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{r.asset}</div>
            <div style={{fontSize:11,color:'#6B7280',marginBottom:4}}>Client: {r.client_name}</div>
            <div style={{fontSize:11,color:'#6B7280',marginBottom:6}}>Driver: {r.assigned_driver}</div>
            <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:10,background:d<0?'#FEF2F2':d<=2?'#FFFBEB':'#ECFDF5',color:d<0?'#991B1B':d<=2?'#92400E':'#065F46'}}>{d<0?Math.abs(d)+'d overdue':d===0?'due today':d+'d left'}</span>
          </div>;})}
        </div>
      </div>
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #F3F4F6',overflow:'hidden'}}>
        <div style={{background:'#111827',padding:'14px 18px'}}><h3 style={{fontSize:14,fontWeight:700,color:'#fff'}}>📅 30-Day Calendar</h3></div>
        <div style={{padding:16,overflowX:'auto'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,minWidth:500}}>
            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} style={{textAlign:'center',fontSize:10,fontWeight:700,color:'#9CA3AF',padding:4}}>{d}</div>)}
            {Array.from({length:today.getDay()}).map((_,i)=><div key={'x'+i}/>)}
            {cal.map((date,i)=>{
              const rents=forDay(date);
              const isT=date.toISOString().slice(0,10)===today.toISOString().slice(0,10);
              return<div key={i} style={{border:'1px solid #F3F4F6',borderRadius:6,padding:4,minHeight:52,background:isT?'#EFF6FF':'#fff'}}>
                <div style={{fontSize:10,fontWeight:isT?700:400,color:isT?'#2563EB':'#6B7280',marginBottom:2}}>{date.getDate()}</div>
                {rents.slice(0,2).map((r,j)=><div key={j} style={{fontSize:8,fontWeight:600,background:'#BFDBFE',color:'#1D4ED8',borderRadius:3,padding:'1px 3px',marginBottom:1,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{r.asset.split(' ').slice(-1)[0]}</div>)}
                {rents.length>2&&<div style={{fontSize:8,color:'#9CA3AF'}}>+{rents.length-2}</div>}
              </div>;
            })}
          </div>
        </div>
      </div>
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #F3F4F6',overflow:'hidden'}}>
        <div style={{background:'#111827',padding:'14px 18px'}}><h3 style={{fontSize:14,fontWeight:700,color:'#fff'}}>⏰ Upcoming Returns</h3></div>
        <div style={{padding:16}}>
          {[...active].sort((a,b)=>new Date(a.due_date)-new Date(b.due_date)).map(r=>{
            const d=days(r.due_date);
            return<div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #F3F4F6',flexWrap:'wrap',gap:8}}>
              <div><div style={{fontSize:13,fontWeight:600}}>{r.asset}</div><div style={{fontSize:11,color:'#6B7280'}}>{r.client_name} · {r.assigned_driver}</div></div>
              <div style={{textAlign:'right'}}><div style={{fontSize:11,fontFamily:'monospace'}}>{fmtD(r.due_date)}</div><span style={{fontSize:11,fontWeight:600,color:d<0?'#DC2626':d<=2?'#D97706':'#059669'}}>{d<0?Math.abs(d)+'d overdue':d===0?'today':d+'d left'}</span></div>
            </div>;
          })}
          {active.length===0&&<div style={{textAlign:'center',padding:24,color:'#9CA3AF'}}>No active rentals</div>}
        </div>
      </div>
    </div>
  );
}

// ── EQUIPMENT MANAGER ──
function EquipmentManager({onClose,onChange,showToast}){
  const [assets,setAssets]=useState([]);const [loading,setLoading]=useState(true);const [newName,setNewName]=useState('');const [newCat,setNewCat]=useState('Machine');const [showP,setShowP]=useState(false);
  const load=async()=>{setLoading(true);const {data}=await sb.from('assets').select('*').order('category').order('name');if(data)setAssets(data);setLoading(false);};
  useEffect(()=>{load();},[]);
  const add=async(name,cat)=>{if(!name.trim())return;if(assets.some(a=>a.name.toLowerCase()===name.trim().toLowerCase())){showToast('Already exists');return;}await sb.from('assets').insert({name:name.trim(),category:cat});setNewName('');await load();onChange&&onChange();showToast('Added ✓');};
  const remove=async(id)=>{await sb.from('assets').delete().eq('id',id);await load();onChange&&onChange();showToast('Removed');};
  const owned=assets.map(a=>a.name.toLowerCase());
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:540,maxHeight:'88vh',overflowY:'auto'}}>
        <div style={{padding:'18px 22px',borderBottom:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff'}}>
          <h2 style={{fontSize:16,fontWeight:700}}>Manage Equipment</h2>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:'50%',border:'1px solid #E5E7EB',background:'#F9FAFB',cursor:'pointer',fontSize:16}}>×</button>
        </div>
        <div style={{padding:'18px 22px'}}>
          <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,padding:14,marginBottom:14}}>
            <p style={{fontSize:11,fontWeight:700,color:'#1D4ED8',marginBottom:10,textTransform:'uppercase'}}>+ Add Custom Equipment</p>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <input style={{...inp,flex:1,minWidth:160,background:'#fff'}} placeholder="Equipment name..." value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add(newName,newCat)}/>
              <select style={{...inp,cursor:'pointer',width:'auto',background:'#fff'}} value={newCat} onChange={e=>setNewCat(e.target.value)}><option>Machine</option><option>Tool</option></select>
              <button onClick={()=>add(newName,newCat)} style={{padding:'9px 18px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff'}}>Add</button>
            </div>
          </div>
          <button onClick={()=>setShowP(s=>!s)} style={{width:'100%',padding:11,borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',marginBottom:14,textAlign:'left',display:'flex',justifyContent:'space-between'}}>
            <span>📋 Browse Presets ({PRESET.Machine.length+PRESET.Tool.length} items)</span><span>{showP?'▲':'▼'}</span>
          </button>
          {showP&&<div style={{marginBottom:14,maxHeight:200,overflowY:'auto',border:'1px solid #F3F4F6',borderRadius:8,padding:12}}>
            {['Machine','Tool'].map(cat=><div key={cat} style={{marginBottom:12}}>
              <p style={{fontSize:11,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',marginBottom:8}}>{cat}s</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {PRESET[cat].map(name=>{const o=owned.includes(name.toLowerCase());return<button key={name} onClick={()=>!o&&add(name,cat)} disabled={o} style={{padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:600,cursor:o?'default':'pointer',border:'1px solid '+(o?'#A7F3D0':'#E5E7EB'),background:o?'#ECFDF5':'#fff',color:o?'#065F46':'#374151'}}>{o?'✓ ':'+ '}{name}</button>;})}
              </div>
            </div>)}
          </div>}
          <p style={{fontSize:11,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',marginBottom:10}}>Your Equipment ({assets.length})</p>
          {loading?<div style={{textAlign:'center',padding:20}}><div className="spinner" style={{margin:'0 auto'}}/></div>
          :['Machine','Tool'].map(cat=>{const items=assets.filter(a=>a.category===cat);if(!items.length)return null;return<div key={cat} style={{marginBottom:12}}>
            <p style={{fontSize:11,fontWeight:600,color:'#6B7280',marginBottom:6}}>{cat}s</p>
            {items.map(a=><div key={a.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'#F9FAFB',borderRadius:7,border:'1px solid #F3F4F6',marginBottom:4}}>
              <span style={{fontSize:13}}>{a.name}</span>
              <button onClick={()=>remove(a.id)} style={{fontSize:11,color:'#EF4444',background:'none',border:'none',cursor:'pointer',fontWeight:600}}>Remove</button>
            </div>)}
          </div>;})}
        </div>
        <div style={{padding:'14px 22px',borderTop:'1px solid #F3F4F6',position:'sticky',bottom:0,background:'#fff'}}>
          <button onClick={onClose} style={{width:'100%',padding:11,borderRadius:8,fontSize:14,fontWeight:600,cursor:'pointer',border:'none',background:'#111827',color:'#fff'}}>Done</button>
        </div>
      </div>
    </div>
  );
}

// ── NEW RENTAL FORM ──
function NewRentalForm({onSaved,onClose,showToast,existingClients}){
  const [step,setStep]=useState(1);const [saving,setSaving]=useState(false);const [assets,setAssets]=useState([]);
  const [cs,setCs]=useState('');
  const [form,setForm]=useState({client_name:'',client_phone:'',client_email:'',client_address:'',client_tag:'New Client',asset:'',assigned_driver:'',start_date:'',duration_days:'',price:'',payment_status:'unpaid',payment_method:'',notes:''});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  useEffect(()=>{sb.from('assets').select('*').order('category').order('name').then(({data})=>{if(data)setAssets(data);});},[]);
  const due=()=>{if(!form.start_date||!form.duration_days)return'';const d=new Date(form.start_date);d.setDate(d.getDate()+parseInt(form.duration_days));return d.toISOString().slice(0,10);};
  const matches=cs.length>1?existingClients.filter(c=>(c.client_name||'').toLowerCase().includes(cs.toLowerCase())):[];
  const fill=c=>{set('client_name',c.client_name);set('client_phone',c.client_phone||'');set('client_email',c.client_email||'');set('client_address',c.client_address||'');set('client_tag',c.client_tag||'New Client');setCs('');};
  const save=async()=>{
    if(!form.client_name||!form.asset||!form.start_date||!form.duration_days||!form.price){showToast('Fill all required fields');return;}
    setSaving(true);
    const cat=assets.find(a=>a.name===form.asset)?.category||'Machine';
    const {error}=await sb.from('rentals').insert({...form,category:cat,due_date:due(),duration_days:parseInt(form.duration_days),price:parseFloat(form.price),rental_status:'active',driver_status:'assigned'});
    setSaving(false);
    if(error){showToast('Error: '+error.message);return;}
    onSaved();
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:560,maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{padding:'18px 22px',borderBottom:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff'}}>
          <h2 style={{fontSize:16,fontWeight:700}}>New Rental — Step {step}/4</h2>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:'50%',border:'1px solid #E5E7EB',background:'#F9FAFB',cursor:'pointer',fontSize:16}}>×</button>
        </div>
        <div style={{padding:22}}>
          {step===1&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
            <h3 style={{fontSize:15,fontWeight:700}}>Client Information</h3>
            <div style={{position:'relative'}}>
              <label style={lbl}>Search Existing Client</label>
              <input style={inp} placeholder="Type name to autofill..." value={cs} onChange={e=>setCs(e.target.value)}/>
              {matches.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid #E5E7EB',borderRadius:8,zIndex:10,boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}>
                {matches.slice(0,5).map((c,i)=><div key={i} onClick={()=>fill(c)} style={{padding:'10px 14px',cursor:'pointer',fontSize:13,borderBottom:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span><strong>{c.client_name}</strong> · {c.client_phone}</span>
                  {c.client_tag&&<TagBadge tag={c.client_tag}/>}
                </div>)}
              </div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {[['client_name','Client Name *','Stallion Construction'],['client_phone','Phone','(646) 000-0000'],['client_email','Email','billing@co.com'],['client_address','Address','459 Underhill Ave, Bronx']].map(([k,l,p])=>(
                <div key={k}><label style={lbl}>{l}</label><input style={inp} placeholder={p} value={form[k]} onChange={e=>set(k,e.target.value)}/></div>
              ))}
              <div style={{gridColumn:'1/-1'}}><label style={lbl}>Client Tag</label>
                <select style={{...inp,cursor:'pointer'}} value={form.client_tag} onChange={e=>set('client_tag',e.target.value)}>
                  {CLIENT_TAGS.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
            </div>
          </div>}

      <table style={{width:'100%',borderCollapse:'collapse',border:'1px solid #90BEE0'}}><tbody><tr style={{background:'#D6E8F7'}}><td style={{padding:'8px 10px',fontWeight:700,textAlign:'right',width:'77%',fontSize:12}}>TOTAL</td><td style={{padding:'8px 14px',fontWeight:700,textAlign:'right',fontSize:14,borderLeft:'2px solid #1D4ED8'}}>{'$ '+total.toLocaleString('en-US',{minimumFractionDigits:2})}</td></tr></tbody></table>
      {method&&<div style={{marginTop:8,fontSize:10,color:'#555'}}>Payment Method: <strong>{method}</strong></div>}
    </div>
  );
  if(preview)return(
    <div style={{maxWidth:720,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <button onClick={()=>setPreview(false)} style={{padding:'8px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff'}}>← Edit</button>
        <div style={{display:'flex',gap:8}}>
          <button onClick={doExcel} style={{padding:'8px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',background:'#065F46',color:'#fff'}}>📊 Export Excel</button>
          <button onClick={()=>window.print()} style={{padding:'8px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',background:'#1D4ED8',color:'#fff'}}>🖨 Print/PDF</button>
        </div>
      </div>
      <Doc/>
    </div>
  );
  return(
    <div style={{maxWidth:760,margin:'0 auto'}}>
      {rentals.length>0&&<div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,padding:'14px 18px',marginBottom:20,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}><span>⚡</span><p style={{fontSize:13,fontWeight:600,color:'#1D4ED8',flex:1}}>Auto-fill from rental</p><select style={{...inp,width:'auto',minWidth:180,cursor:'pointer',background:'#fff'}} value={prefill} onChange={e=>doPrefill(e.target.value)}><option value="">Select rental...</option>{rentals.map(r=><option key={r.id} value={r.id}>{r.id} — {r.client_name}</option>)}</select></div>}
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #F3F4F6',overflow:'hidden'}}>
        <div style={{background:'#1D4ED8',padding:'16px 22px'}}><h3 style={{fontSize:14,fontWeight:700,color:'#fff'}}>Invoice Builder <span style={{fontSize:11,color:'#BFDBFE',fontWeight:400}}>— matches INV #332 format</span></h3></div>
        <div style={{padding:22,display:'flex',flexDirection:'column',gap:16}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label style={lbl}>Invoice No.</label><input style={inp} placeholder="332" value={invNo} onChange={e=>setInvNo(e.target.value)}/></div>
            <div><label style={lbl}>Invoice Date</label><input type="date" style={inp} value={invDate} onChange={e=>setInvDate(e.target.value)}/></div>
          </div>
          <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:8,padding:14}}>
            <p style={{fontSize:11,fontWeight:700,color:'#1D4ED8',marginBottom:10,textTransform:'uppercase'}}>Bill To</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div style={{gridColumn:'1/-1'}}><label style={lbl}>Client / Company Name</label><input style={inp} placeholder="Stallion Construction" value={billTo} onChange={e=>setBillTo(e.target.value)}/></div>
              <div><label style={lbl}>Address</label><input style={inp} placeholder="3 Peardegat 6th Street" value={addr1} onChange={e=>setAddr1(e.target.value)}/></div>
              <div><label style={lbl}>City / State</label><input style={inp} placeholder="Brooklyn, NY" value={addr2} onChange={e=>setAddr2(e.target.value)}/></div>
              <div style={{gridColumn:'1/-1'}}><label style={lbl}>Phone</label><input style={inp} value={phone} onChange={e=>setPhone(e.target.value)}/></div>
            </div>
          </div>
          <div><label style={lbl}>Line Items</label>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{background:'#1D4ED8'}}>{['Description','Date','Amount',''].map((h,i)=><th key={i} style={{padding:'7px 10px',textAlign:'left',color:'#fff',fontSize:11,fontWeight:700,width:i===1?'140px':i===2?'120px':i===3?'32px':'auto'}}>{h}</th>)}</tr></thead>
              <tbody>{items.map((item,idx)=><tr key={item.id} style={{background:idx%2===0?'#fff':'#EAF4FB'}}><td style={{padding:'3px 3px 3px 0'}}><input style={{...inp,fontStyle:'italic'}} placeholder="e.g. CONTAINER CLEAN CONCRETE" value={item.desc} onChange={e=>setItems(p=>p.map(i=>i.id===item.id?{...i,desc:e.target.value}:i))}/></td><td style={{padding:3}}><input type="date" style={inp} value={item.date} onChange={e=>setItems(p=>p.map(i=>i.id===item.id?{...i,date:e.target.value}:i))}/></td><td style={{padding:3}}><input type="number" step="0.01" style={inp} placeholder="0.00" value={item.amount} onChange={e=>setItems(p=>p.map(i=>i.id===item.id?{...i,amount:e.target.value}:i))}/></td><td style={{padding:'3px 0 3px 3px',textAlign:'center'}}>{items.length>1&&<button onClick={()=>setItems(p=>p.filter(i=>i.id!==item.id))} style={{background:'none',border:'none',cursor:'pointer',color:'#EF4444',fontSize:16}}>×</button>}</td></tr>)}</tbody>
            </table>
            <button onClick={()=>{setItems(p=>[...p,{id:nextId,desc:'',date:'',amount:''}]);setNextId(n=>n+1);}} style={{fontSize:12,color:'#1D4ED8',background:'none',border:'none',cursor:'pointer',fontWeight:600,padding:'8px 0'}}>+ Add line item</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10}}>
            <div><label style={lbl}>Sales Tax ($)</label><input type="number" step="0.01" style={inp} placeholder="0.00" value={tax} onChange={e=>setTax(e.target.value)}/></div>
            <div><label style={lbl}>Other ($)</label><input type="number" step="0.01" style={inp} placeholder="0.00" value={other} onChange={e=>setOther(e.target.value)}/></div>
            <div><label style={lbl}>Payment Method</label><select style={{...inp,cursor:'pointer'}} value={method} onChange={e=>setMethod(e.target.value)}><option value="">—</option>{['Cash','Check','Zelle','Venmo','Bank Transfer','Credit Card'].map(m=><option key={m}>{m}</option>)}</select></div>
            <div><label style={lbl}>Notes</label><input style={inp} placeholder="not tax included..." value={notes} onChange={e=>setNotes(e.target.value)}/></div>
          </div>
          <div style={{background:'#D6E8F7',border:'1px solid #90BEE0',borderRadius:8,padding:'12px 16px',textAlign:'right'}}><span style={{fontSize:16,fontWeight:700}}>TOTAL: $ {total.toLocaleString('en-US',{minimumFractionDigits:2})}</span></div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button onClick={()=>setPreview(true)} style={{flex:1,minWidth:140,padding:13,background:'#1D4ED8',color:'#fff',border:'none',borderRadius:9,fontSize:14,fontWeight:700,cursor:'pointer'}}>👁 Preview</button>
            <button onClick={doExcel} style={{flex:1,minWidth:140,padding:13,background:'#065F46',color:'#fff',border:'none',borderRadius:9,fontSize:14,fontWeight:700,cursor:'pointer'}}>📊 Export Excel</button>
            <button onClick={saveAndSend} style={{flex:1,minWidth:140,padding:13,background:'#7C3AED',color:'#fff',border:'none',borderRadius:9,fontSize:14,fontWeight:700,cursor:'pointer'}}>📧 Save & Send</button>
          </div>
        </div>
      </div>
    </div>
  );
}

          </div>

              <div><div style={{fontSize:13,fontWeight:700}}>{driver}</div><div style={{fontSize:11,color:'#9CA3AF',wordBreak:'break-all'}}>{link}</div></div>
              <button onClick={()=>{navigator.clipboard.writeText(link);showToast(driver+' link copied!');}} style={{padding:'6px 12px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',whiteSpace:'nowrap'}}>📋 Copy</button>
            </div>;})}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──
function App(){
  const hash=window.location.hash.slice(1);
  const portalMatch=hash.match(/^\/portal\/(.+)$/);
  if(portalMatch)return <ClientPortal token={portalMatch[1]}/>;
  const driverMatch=hash.match(/^\/driver\/(.+)$/);
  if(driverMatch)return <DriverApp name={decodeURIComponent(driverMatch[1])}/>;

  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('dashboard');
  const [rentals,setRentals]=useState([]);
  const [extensions,setExtensions]=useState([]);
  const [loading,setLoading]=useState(false);
  const [toast,setToast]=useState('');
  const [search,setSearch]=useState('');
  const [showForm,setShowForm]=useState(false);
  const [showEquip,setShowEquip]=useState(false);
  const [clientPanel,setClientPanel]=useState(null);
  const [editRental,setEditRental]=useState(null);
  const [deleted,setDeleted]=useState([]);
  const [showDeleted,setShowDeleted]=useState(false);

  useEffect(()=>{const u=localStorage.getItem('sams_user');if(u)setUser(JSON.parse(u));},[]);
  useEffect(()=>{if(user)loadData();},[user]);

  const loadData=async()=>{
    setLoading(true);
    const [r1,r2]=await Promise.all([
      sb.from('rentals').select('*').order('created_at',{ascending:false}),
      sb.from('extension_requests').select('*').eq('status','pending'),
    ]);
    if(r1.data){
      setRentals(r1.data.filter(r=>!r.deleted));
      setDeleted(r1.data.filter(r=>r.deleted));
    }
    if(r2.data)setExtensions(r2.data);
    setLoading(false);
  };

  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(''),3000);};
  const copyLink=(t)=>{
    const url=APP+'/#/portal/'+t;
    window.open(url,'_blank');
    navigator.clipboard.writeText(url).catch(()=>{});
    showToast('Portal opened in new tab!');
  };
  const markPaid=async(id)=>{await sb.from('rentals').update({payment_status:'paid'}).eq('id',id);showToast('Marked paid ✓');loadData();};
  const softDelete=async(id)=>{if(!window.confirm('Move to Recently Deleted?'))return;if(!window.confirm('Are you sure?'))return;await sb.from('rentals').update({deleted:true}).eq('id',id);showToast('Moved to deleted');loadData();};
  const restoreRental=async(id)=>{await sb.from('rentals').update({deleted:false}).eq('id',id);showToast('Restored ✓');loadData();};
  const hardDelete=async(id)=>{if(!window.confirm('PERMANENTLY delete? Cannot undo!'))return;if(!window.confirm('FINAL: Delete forever?'))return;await sb.from('rentals').delete().eq('id',id);showToast('Deleted permanently');loadData();};
  const setDriverStatus=async(id,status)=>{await sb.from('rentals').update({driver_status:status}).eq('id',id);loadData();};
  const approveExt=async(ext)=>{const r=rentals.find(x=>x.id===ext.rental_id);if(!r)return;const d=new Date(r.due_date);d.setDate(d.getDate()+ext.extra_days);await sb.from('rentals').update({due_date:d.toISOString().slice(0,10),price:r.price+ext.extra_cost}).eq('id',ext.rental_id);await sb.from('extension_requests').update({status:'approved'}).eq('id',ext.id);showToast('Extension approved ✓');loadData();};
  const denyExt=async(id)=>{await sb.from('extension_requests').update({status:'denied'}).eq('id',id);loadData();};

  if(!user)return <Login onLogin={u=>{localStorage.setItem('sams_user',JSON.stringify(u));setUser(u);}}/>;

  const filtered=search?rentals.filter(r=>(r.client_name||'').toLowerCase().includes(search.toLowerCase())||(r.asset||'').toLowerCase().includes(search.toLowerCase())||(r.id||'').toLowerCase().includes(search.toLowerCase())):rentals;
  const uniqueClients=Array.from(new Set(rentals.map(r=>r.client_name))).map(n=>rentals.find(r=>r.client_name===n));
  const active=rentals.filter(r=>r.rental_status==='active').length;
  const overdue=rentals.filter(r=>days(r.due_date)<0&&r.payment_status!=='paid').length;
  const revenue=rentals.filter(r=>r.payment_status==='paid').reduce((s,r)=>s+r.price,0);

  return(
    <div style={{minHeight:'100vh'}}>
      {toast&&<div style={{position:'fixed',bottom:24,right:24,background:'#111827',color:'#fff',padding:'12px 20px',borderRadius:10,fontWeight:600,fontSize:14,zIndex:500,animation:'fadeIn 0.3s'}}>{toast}</div>}
      {showForm&&<NewRentalForm onSaved={()=>{setShowForm(false);loadData();showToast('Rental saved!');}} onClose={()=>setShowForm(false)} showToast={showToast} existingClients={uniqueClients}/>}
      {showEquip&&<EquipmentManager onClose={()=>setShowEquip(false)} onChange={loadData} showToast={showToast}/>}
      {clientPanel&&<ClientPanel client={clientPanel} rentals={rentals} onClose={()=>setClientPanel(null)} copyLink={copyLink} showToast={showToast}/>}
      {editRental&&<EditRental rental={editRental} onClose={()=>setEditRental(null)} onSaved={()=>{setEditRental(null);loadData();showToast('Updated ✓');}} showToast={showToast}/>}

      <header style={{background:'#fff',borderBottom:'1px solid #E5E7EB',padding:'0 16px',display:'flex',alignItems:'center',gap:10,height:54,position:'sticky',top:0,zIndex:100,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:14,fontWeight:700,whiteSpace:'nowrap'}}>Sams Construction</span>
          <span style={{fontSize:10,fontWeight:600,color:'#2563EB',background:'#EFF6FF',padding:'2px 6px',borderRadius:4}}>SamsOffice</span>
        </div>
        <div style={{position:'relative',flex:1,maxWidth:240}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search clients..." style={{width:'100%',padding:'6px 12px',border:'1px solid #E5E7EB',borderRadius:8,fontSize:12,outline:'none',background:'#F9FAFB'}}/>
        </div>
        <nav style={{display:'flex',gap:2}}>
          {[{id:'dashboard',l:'Dashboard'},{id:'drivers',l:'🚛 Drivers'},{id:'collections',l:'⚖️ Collections'},{id:'invoice',l:'📄 Invoice'},{id:'schedule',l:'📅 Schedule'},{id:'settings',l:'⚙️ Settings'}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:500,cursor:'pointer',border:'none',background:tab===t.id?'#F3F4F6':'transparent',color:tab===t.id?'#111827':'#6B7280',whiteSpace:'nowrap'}}>{t.l}</button>)}
        </nav>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          {overdue>0&&<span style={{padding:'3px 8px',borderRadius:20,background:'#FEF2F2',border:'1px solid #FCA5A5',fontSize:11,fontWeight:600,color:'#991B1B'}}>{overdue} overdue</span>}
          <button onClick={()=>setShowEquip(true)} style={{padding:'5px 10px',borderRadius:7,fontSize:11,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff'}}>⚙ Equipment</button>
          <button onClick={()=>setShowForm(true)} style={{padding:'6px 12px',borderRadius:7,fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff'}}>+ New Rental</button>
          <button onClick={()=>{localStorage.removeItem('sams_user');setUser(null);}} style={{padding:'5px 10px',borderRadius:7,fontSize:11,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff'}}>Sign Out</button>
        </div>
      </header>

      <main style={{padding:'20px 16px',maxWidth:1400,margin:'0 auto'}}>
        {/* Recently Deleted */}
        {deleted.length>0&&<div style={{marginBottom:16}}>
          <button onClick={()=>setShowDeleted(s=>!s)} style={{padding:'6px 14px',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',border:'1px solid #FDE68A',background:'#FFFBEB',color:'#92400E',marginBottom:8}}>🗑 Recently Deleted ({deleted.length}) {showDeleted?'▲':'▼'}</button>
          {showDeleted&&<div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:10,padding:'14px 18px'}}>
            {deleted.map(r=><div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #FDE68A',flexWrap:'wrap',gap:8}}>
              <span style={{fontSize:13}}><strong>{r.id}</strong> — {r.client_name} — {r.asset} — {money(r.price)}</span>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>restoreRental(r.id)} style={{padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',border:'none',background:'#ECFDF5',color:'#065F46'}}>↩ Restore</button>
                <button onClick={()=>hardDelete(r.id)} style={{padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',border:'none',background:'#FEF2F2',color:'#991B1B'}}>Delete Forever</button>
              </div>
            </div>)}
          </div>}
        </div>}

        {/* Extension requests */}
        {extensions.length>0&&<div style={{background:'#FFFBEB',border:'1px solid #FCD34D',borderRadius:10,padding:'14px 18px',marginBottom:18}}>
          <h4 style={{fontSize:13,fontWeight:700,color:'#92400E',marginBottom:10}}>📅 Pending Extensions ({extensions.length})</h4>
          {extensions.map(ext=><div key={ext.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #FDE68A',flexWrap:'wrap',gap:8}}>
            <span style={{fontSize:13}}><strong>{ext.client_name}</strong> — {ext.rental_id} — +{ext.extra_days}d (+{money(ext.extra_cost)})</span>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>approveExt(ext)} style={{padding:'5px 12px',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:'#ECFDF5',color:'#065F46'}}>✓ Approve</button>
              <button onClick={()=>denyExt(ext.id)} style={{padding:'5px 12px',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:'#FEF2F2',color:'#991B1B'}}>✕ Deny</button>
            </div>
          </div>)}
        </div>}

        {loading&&<div style={{textAlign:'center',padding:48}}><div className="spinner" style={{margin:'0 auto'}}/></div>}

        {!loading&&tab==='dashboard'&&<>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:14,marginBottom:20}}>
            {[{l:'Active Rentals',v:active,a:false},{l:'Overdue',v:overdue,a:overdue>0},{l:'Total Rentals',v:rentals.length,a:false},{l:'Revenue',v:money(revenue),a:false}].map((s,i)=><div key={i} style={{background:'#fff',borderRadius:10,padding:'14px 16px',border:'1px solid #F3F4F6'}}><p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF',marginBottom:6}}>{s.l}</p><p style={{fontSize:22,fontWeight:700,color:s.a?'#DC2626':'#111827'}}>{s.v}</p></div>)}
          </div>
          <div style={{background:'#fff',borderRadius:11,overflow:'hidden',border:'1px solid #F3F4F6'}}>
            <div style={{padding:'12px 16px',borderBottom:'1px solid #F3F4F6'}}><h3 style={{fontSize:14,fontWeight:700}}>All Rentals ({filtered.length})</h3></div>
            {filtered.length===0?<div style={{padding:40,textAlign:'center',color:'#9CA3AF'}}><div style={{fontSize:32}}>📋</div>No rentals yet</div>
            :<div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead><tr style={{background:'#FAFAFA'}}>{['Asset','Client','Driver','Delivery','Due','Price','Pay','Actions'].map(h=><th key={h} style={{padding:'9px 10px',textAlign:'left',fontSize:10,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF',borderBottom:'1px solid #F3F4F6',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
              <tbody>{filtered.map((r,i)=>{
                const d=days(r.due_date);const bg=i%2===0?'#fff':'#FAFAFA';
                const step=getStep(r.driver_status);
                const stepIdx=STEPS.findIndex(x=>x.key===r.driver_status);
                const nextS=STEPS[stepIdx+1];const prevS=STEPS[stepIdx-1];

  return <div style={{minHeight:'100vh',background:'#F9FAFB'}}>
    <div style={{background:'#fff',padding:'16px 20px',borderBottom:'1px solid #E5E7EB',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div><h1 style={{fontSize:20,fontWeight:700}}>👷 {name}</h1><p style={{fontSize:12,color:'#9CA3AF'}}>{jobs.length} trabajos activos · Sams Construction</p></div>
    </div>
    <div style={{padding:16,display:'flex',flexDirection:'column',gap:16}}>
      {jobs.length===0
        ?<div style={{textAlign:'center',padding:60,color:'#9CA3AF'}}><div style={{fontSize:48}}>✅</div>Sin trabajos activos</div>
        :jobs.map(r=>{
          const step=getStepEs(r.driver_status);
          const stepIdx=STEPS_ES.findIndex(x=>x.key===r.driver_status);
          const next=STEPS_ES[stepIdx+1];
          const prev=STEPS_ES[stepIdx-1];
          const d=days(r.due_date);
          return <div key={r.id} style={{background:'#fff',borderRadius:14,overflow:'hidden',border:'1px solid #E5E7EB'}}>
            <div style={{padding:'14px 16px',borderBottom:'1px solid #E5E7EB',background:'#F9FAFB'}}>
              <div style={{fontSize:18,fontWeight:700}}>{r.asset}</div>
              <div style={{fontSize:13,color:'#6B7280'}}>{r.client_name}</div>
            </div>
            <div style={{padding:'12px 16px',fontSize:13,color:'#374151',lineHeight:2,borderBottom:'1px solid #E5E7EB'}}>
              <div>📍 {r.client_address}</div>
              <div>📅 Vence: {r.due_date} ({d<0?Math.abs(d)+'d vencido':d===0?'hoy':d+'d restantes'})</div>
              <div>💰 {money(r.price)} · {r.payment_status==='paid'?'PAGADO':r.payment_status==='partial'?'PARCIAL':'NO PAGADO'}</div>
              {r.notes&&<div style={{marginTop:6,padding:'8px 10px',background:'#FFFBEB',borderRadius:6,fontSize:12,color:'#92400E'}}>📝 Notas de Oficina: {r.notes}</div>}
            </div>
            <div style={{padding:'12px 16px',borderBottom:'1px solid #E5E7EB'}}>
              <div style={{height:8,background:'#F3F4F6',borderRadius:10,marginBottom:10}}>
                <div style={{height:'100%',width:step.pct+'%',background:step.pct===100?'#10B981':'#2563EB',borderRadius:10}}/>
              </div>
              <div style={{fontSize:12,fontWeight:600,color:'#111827',marginBottom:10}}>Estado: <span style={{color:'#2563EB'}}>{step.label}</span></div>
              {next&&<button onClick={()=>setStatus(r.id,next.key)} style={{width:'100%',padding:14,borderRadius:10,fontSize:16,fontWeight:700,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff',marginBottom:8}}>✅ Confirmar: {next.label}</button>}
              {prev&&<button onClick={()=>{if(window.confirm('¿Regresar un paso?'))setStatus(r.id,prev.key);}} style={{width:'100%',padding:10,borderRadius:10,fontSize:13,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',color:'#6B7280'}}>↩ Deshacer — Regresar un Paso</button>}
            </div>
            <div style={{padding:'12px 16px',borderBottom:'1px solid #E5E7EB'}}>
              <div style={{fontSize:12,fontWeight:700,marginBottom:8}}>📋 Lista de Verificación de Entrega</div>
              {CHECKLIST.map((item,i)=><CheckItem key={i} label={item}/>)}
            </div>
            <div style={{padding:'12px 16px',display:'flex',gap:8}}>
              <a href={'tel:'+(r.client_phone||'').replace(/[^0-9]/g,'')} style={{flex:1,padding:12,borderRadius:9,background:'#1D4ED8',color:'#fff',textDecoration:'none',fontSize:14,fontWeight:600,textAlign:'center'}}>📞 Llamar</a>
              <a href={'https://maps.google.com?q='+encodeURIComponent(r.client_address||'')} target="_blank" style={{flex:1,padding:12,borderRadius:9,background:'#065F46',color:'#fff',textDecoration:'none',fontSize:14,fontWeight:600,textAlign:'center'}}>🗺 Mapa</a>
            </div>
          </div>;
        })
      }
    </div>
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
window.addEventListener('hashchange',()=>root.render(<App/>));
</script>
</body>
</html>

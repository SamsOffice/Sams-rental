// ── HELPERS ──
function daysUntil(d){return Math.ceil((new Date(d)-new Date().setHours(0,0,0,0))/86400000);}
function fmtDate(s){if(!s)return'—';return new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function money(n){return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

const DRIVER_FLOW = [
  {key:'assigned',label:'📋 Assigned',pct:5},
  {key:'on_the_way',label:'🚛 On the Way',pct:35},
  {key:'picked_up',label:'📦 Loaded/Picked Up',pct:65},
  {key:'delivered',label:'✅ Delivered',pct:100},
];
function driverStep(s){return DRIVER_FLOW.find(x=>x.key===s)||DRIVER_FLOW[0];}

function PayBadge({status}){
  const c={paid:{bg:'#ECFDF5',text:'#065F46',dot:'#10B981',label:'Paid'},unpaid:{bg:'#FEF2F2',text:'#991B1B',dot:'#EF4444',label:'Unpaid'},partial:{bg:'#FFFBEB',text:'#92400E',dot:'#F59E0B',label:'Partial'}}[status]||{bg:'#F3F4F6',text:'#374151',dot:'#9CA3AF',label:status};
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,background:c.bg,color:c.text,padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:600}}><span style={{width:6,height:6,borderRadius:'50%',background:c.dot}}/>{c.label}</span>;
}
function DriverBadge({status}){
  const s=driverStep(status);
  const colors={assigned:'#6B7280',on_the_way:'#1D4ED8',picked_up:'#92400E',delivered:'#065F46'}[status]||'#6B7280';
  return <span style={{fontSize:11,fontWeight:600,color:colors}}>{s.label}</span>;
}

// ── EQUIPMENT MANAGER ──
function EquipmentManager({onClose,onChange,showToast}){
  const [assets,setAssets]=useState([]);
  const [loading,setLoading]=useState(true);
  const [newName,setNewName]=useState('');
  const [newCat,setNewCat]=useState('Machine');
  const [showPresets,setShowPresets]=useState(false);

  const load=async()=>{setLoading(true);const {data}=await sb.from('assets').select('*').order('category').order('name');if(data)setAssets(data);setLoading(false);};
  useEffect(()=>{load();},[]);

  const addAsset=async(name,cat)=>{
    if(!name.trim())return;
    if(assets.some(a=>a.name.toLowerCase()===name.trim().toLowerCase())){showToast('Already exists');return;}
    const {error}=await sb.from('assets').insert({name:name.trim(),category:cat});
    if(error){showToast('Error: '+error.message);return;}
    setNewName('');await load();onChange&&onChange();showToast('Equipment added ✓');
  };
  const removeAsset=async(id)=>{
    await sb.from('assets').delete().eq('id',id);
    await load();onChange&&onChange();showToast('Removed');
  };
  const addPreset=async(name,cat)=>{
    if(assets.some(a=>a.name.toLowerCase()===name.toLowerCase())){showToast('Already added');return;}
    await sb.from('assets').insert({name,category:cat});
    await load();onChange&&onChange();showToast(name+' added ✓');
  };

  const inp={background:'#FAFAFA',border:'1px solid #E5E7EB',borderRadius:8,padding:'9px 12px',fontSize:13,outline:'none'};
  const ownedNames=assets.map(a=>a.name.toLowerCase());

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:560,maxHeight:'88vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
        <div style={{padding:'18px 22px',borderBottom:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff',zIndex:1}}>
          <div>
            <h2 style={{fontSize:16,fontWeight:700}}>Manage Equipment</h2>
            <p style={{fontSize:12,color:'#9CA3AF',marginTop:2}}>Add your own or pick from presets</p>
          </div>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:'50%',border:'1px solid #E5E7EB',background:'#F9FAFB',cursor:'pointer',fontSize:16,color:'#6B7280'}}>×</button>
        </div>

        <div style={{padding:'18px 22px'}}>
          {/* Add custom */}
          <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,padding:'14px',marginBottom:16}}>
            <p style={{fontSize:12,fontWeight:700,color:'#1D4ED8',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.05em'}}>+ Add Your Own Equipment</p>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <input style={{...inp,flex:1,minWidth:160,background:'#fff'}} placeholder="e.g. Komatsu Excavator PC210" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addAsset(newName,newCat)}/>
              <select style={{...inp,cursor:'pointer',background:'#fff'}} value={newCat} onChange={e=>setNewCat(e.target.value)}>
                <option>Machine</option><option>Tool</option>
              </select>
              <button onClick={()=>addAsset(newName,newCat)} style={{padding:'9px 18px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff'}}>Add</button>
            </div>
          </div>

          {/* Presets toggle */}
          <button onClick={()=>setShowPresets(s=>!s)} style={{width:'100%',padding:'11px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',color:'#374151',marginBottom:16,textAlign:'left',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>📋 Browse Preset Equipment List ({PRESET_EQUIPMENT.Machine.length+PRESET_EQUIPMENT.Tool.length} items)</span>
            <span>{showPresets?'▲':'▼'}</span>
          </button>

          {showPresets && (
            <div style={{marginBottom:16,maxHeight:240,overflowY:'auto',border:'1px solid #F3F4F6',borderRadius:8,padding:12}}>
              {['Machine','Tool'].map(cat=>(
                <div key={cat} style={{marginBottom:12}}>
                  <p style={{fontSize:11,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',marginBottom:8}}>{cat}s</p>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {PRESET_EQUIPMENT[cat].map(name=>{
                      const owned=ownedNames.includes(name.toLowerCase());
                      return (
                        <button key={name} onClick={()=>!owned&&addPreset(name,cat)} disabled={owned} style={{padding:'5px 10px',borderRadius:20,fontSize:11,fontWeight:600,cursor:owned?'default':'pointer',border:'1px solid '+(owned?'#A7F3D0':'#E5E7EB'),background:owned?'#ECFDF5':'#fff',color:owned?'#065F46':'#374151'}}>
                          {owned?'✓ ':'+ '}{name}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Current list */}
          <p style={{fontSize:12,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:10}}>Your Equipment ({assets.length})</p>
          {loading?<div style={{textAlign:'center',padding:20}}><div className="spinner" style={{margin:'0 auto'}}/></div>
          :['Machine','Tool'].map(cat=>{
            const items=assets.filter(a=>a.category===cat);
            if(items.length===0)return null;
            return (
              <div key={cat} style={{marginBottom:14}}>
                <p style={{fontSize:11,fontWeight:600,color:'#6B7280',marginBottom:6}}>{cat}s</p>
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {items.map(a=>(
                    <div key={a.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',background:'#F9FAFB',borderRadius:7,border:'1px solid #F3F4F6'}}>
                      <span style={{fontSize:13}}>{a.name}</span>
                      <button onClick={()=>removeAsset(a.id)} style={{fontSize:11,color:'#EF4444',background:'none',border:'none',cursor:'pointer',fontWeight:600}}>Remove</button>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{padding:'14px 22px',borderTop:'1px solid #F3F4F6',position:'sticky',bottom:0,background:'#fff'}}>
          <button onClick={onClose} style={{width:'100%',padding:'11px',borderRadius:8,fontSize:14,fontWeight:600,cursor:'pointer',border:'none',background:'#111827',color:'#fff'}}>Done</button>
        </div>
      </div>
    </div>
  );
}

// ── NEW RENTAL FORM ──
function NewRentalForm({onSaved,onClose,showToast}){
  const [step,setStep]=useState(1);
  const [saving,setSaving]=useState(false);
  const [assets,setAssets]=useState([]);
  const [form,setForm]=useState({client_name:'',client_phone:'',client_email:'',client_address:'',asset:'',assigned_driver:'',start_date:'',start_time:'08:00',duration_days:'',price:'',payment_status:'unpaid',payment_method:'',notes:''});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  useEffect(()=>{sb.from('assets').select('*').order('category').order('name').then(({data})=>{if(data)setAssets(data);});},[]);
  const dueDate=()=>{if(!form.start_date||!form.duration_days)return'';const d=new Date(form.start_date);d.setDate(d.getDate()+parseInt(form.duration_days));return d.toISOString().slice(0,10);};
  const inp={width:'100%',background:'#FAFAFA',border:'1px solid #E5E7EB',borderRadius:8,padding:'10px 12px',fontSize:13,outline:'none',boxSizing:'border-box'};
  const lbl={fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:'#9CA3AF',display:'block',marginBottom:6};
  const save=async()=>{
    if(!form.client_name||!form.asset||!form.start_date||!form.duration_days||!form.price){showToast('Fill all required fields');return;}
    setSaving(true);
    const cat=assets.find(a=>a.name===form.asset)?.category||'Machine';
    const {error}=await sb.from('rentals').insert({client_name:form.client_name,client_phone:form.client_phone,client_email:form.client_email,client_address:form.client_address,asset:form.asset,category:cat,assigned_driver:form.assigned_driver,start_date:form.start_date,start_time:form.start_time,due_date:dueDate(),duration_days:parseInt(form.duration_days),price:parseFloat(form.price),payment_status:form.payment_status,payment_method:form.payment_method,rental_status:'active',driver_status:'assigned',notes:form.notes});
    setSaving(false);
    if(error){showToast('Error: '+error.message);return;}
    onSaved();
  };
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:580,maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{padding:'18px 22px',borderBottom:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff'}}>
          <h2 style={{fontSize:16,fontWeight:700}}>New Rental — Step {step}/4</h2>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:'50%',border:'1px solid #E5E7EB',background:'#F9FAFB',cursor:'pointer',fontSize:16,color:'#6B7280'}}>×</button>
        </div>
        <div style={{padding:22}}>
          {step===1&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
            <h3 style={{fontSize:15,fontWeight:700}}>Client Information</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {[['client_name','Client Name *','Stallion Construction'],['client_phone','Phone','(646) 000-0000'],['client_email','Email','billing@co.com'],['client_address','Address','459 Underhill Ave, Bronx']].map(([k,l,p])=>(
                <div key={k}><label style={lbl}>{l}</label><input style={inp} placeholder={p} value={form[k]} onChange={e=>set(k,e.target.value)}/></div>
              ))}
            </div>
          </div>}
          {step===2&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
            <h3 style={{fontSize:15,fontWeight:700}}>Equipment & Driver</h3>
            <div><label style={lbl}>Equipment *</label>
              <select style={{...inp,cursor:'pointer'}} value={form.asset} onChange={e=>set('asset',e.target.value)}>
                <option value="">Select equipment...</option>
                <optgroup label="Machines">{assets.filter(a=>a.category==='Machine').map(a=><option key={a.id}>{a.name}</option>)}</optgroup>
                <optgroup label="Tools">{assets.filter(a=>a.category==='Tool').map(a=><option key={a.id}>{a.name}</option>)}</optgroup>
              </select>
              <p style={{fontSize:11,color:'#9CA3AF',marginTop:6}}>Need to add a machine type? Close this and click ⚙ Equipment first.</p>
            </div>
            <div><label style={lbl}>Assigned Driver *</label>
              <select style={{...inp,cursor:'pointer'}} value={form.assigned_driver} onChange={e=>set('assigned_driver',e.target.value)}>
                <option value="">Select driver...</option>
                {WORKERS.map(d=><option key={d}>{d}</option>)}
              </select>
            </div>
          </div>}
          {step===3&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
            <h3 style={{fontSize:15,fontWeight:700}}>Timeframe</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div><label style={lbl}>Start Date *</label><input type="date" style={inp} value={form.start_date} onChange={e=>set('start_date',e.target.value)}/></div>
              <div><label style={lbl}>Start Time</label><input type="time" style={inp} value={form.start_time} onChange={e=>set('start_time',e.target.value)}/></div>
              <div><label style={lbl}>Duration (days) *</label><input type="number" min="1" style={inp} placeholder="3" value={form.duration_days} onChange={e=>set('duration_days',e.target.value)}/></div>
              <div><label style={lbl}>Due Date (auto)</label><div style={{...inp,background:'#F9FAFB',fontSize:12}}>{dueDate()||'Fill above'}</div></div>
            </div>
          </div>}
          {step===4&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
            <h3 style={{fontSize:15,fontWeight:700}}>Payment & Notes</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div><label style={lbl}>Price ($) *</label><input type="number" style={inp} placeholder="4500" value={form.price} onChange={e=>set('price',e.target.value)}/></div>
              <div><label style={lbl}>Payment Status</label><select style={{...inp,cursor:'pointer'}} value={form.payment_status} onChange={e=>set('payment_status',e.target.value)}><option value="unpaid">Unpaid</option><option value="partial">Partial</option><option value="paid">Paid</option></select></div>
              <div><label style={lbl}>Payment Method</label><select style={{...inp,cursor:'pointer'}} value={form.payment_method} onChange={e=>set('payment_method',e.target.value)}><option value="">Select...</option>{['Cash','Check','Zelle','Venmo','Card','Bank Transfer'].map(m=><option key={m}>{m}</option>)}</select></div>
              <div style={{gridColumn:'1/-1'}}><label style={lbl}>Notes</label><textarea style={{...inp,minHeight:70}} placeholder="RENT CAT 320 - 3 DAYS, DELIVERY..." value={form.notes} onChange={e=>set('notes',e.target.value)}/></div>
            </div>
          </div>}
        </div>
        <div style={{padding:'14px 22px',borderTop:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',bottom:0,background:'#fff'}}>
          <button onClick={()=>setStep(s=>Math.max(1,s-1))} disabled={step===1} style={{padding:'8px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:step===1?'not-allowed':'pointer',border:'1px solid #E5E7EB',background:'#fff',color:step===1?'#D1D5DB':'#374151'}}>← Back</button>
          {step<4?<button onClick={()=>setStep(s=>s+1)} style={{padding:'8px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff'}}>Continue →</button>
          :<button onClick={save} disabled={saving} style={{padding:'8px 18px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',background:saving?'#9CA3AF':'#111827',color:'#fff'}}>{saving?'Saving...':'Save Rental'}</button>}
        </div>
      </div>
    </div>
  );
}

// ── INVOICE TAB (copy-paste + Excel export) ──
function InvoiceTab({rentals,showToast}){
  const [invNo,setInvNo]=useState('');
  const [invDate,setInvDate]=useState(new Date().toISOString().slice(0,10));
  const [client,setClient]=useState('');
  const [addr,setAddr]=useState('');
  const [phone,setPhone]=useState('');
  const [method,setMethod]=useState('');

  const [nextId,setNextId]=useState(3);
  const [tax,setTax]=useState('');
  const [other,setOther]=useState('');
  const [prefill,setPrefill]=useState('');

  const lbl={fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:'#9CA3AF',display:'block',marginBottom:5};
  const sub=items.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const taxA=parseFloat(tax)||0, otherA=parseFloat(other)||0, total=sub+taxA+otherA;
  const doPrefill=rid=>{setPrefill(rid);const r=rentals.find(x=>x.id===rid);if(!r)return;setInvNo(rid);setInvDate(r.start_date||'');setClient(r.client_name||'');setAddr(r.client_address||'');setPhone(r.client_phone||'');setMethod(r.payment_method||'');setItems([{id:1,desc:r.asset||'',date:r.start_date||'',amount:String(r.price||'')},{id:2,desc:'',date:'',amount:''}]);};
  const li=items.filter(i=>i.desc||i.amount);

  // Build plain text version
  const plainText=()=>{
    let t=`SAMS CONSTRUCTION SERVICES LTD\n188-16 Woodhull Ave, Hollis NY 11423\nTel: +1 (917) 663-6369  |  BIC# 4376\n`;
    t+=`${'='.repeat(44)}\n`;
    t+=`Invoice No: ${invNo||'—'}\nDate: ${fmtDate(invDate)}\n\n`;
    t+=`BILL TO:\n${client}\n${addr}\n${phone}\n`;
    t+=`${'='.repeat(44)}\n`;
    t+=`DESCRIPTION`.padEnd(28)+`DATE`.padEnd(10)+`AMOUNT\n`;
    t+=`${'-'.repeat(44)}\n`;
    li.forEach(i=>{t+=`${(i.desc||'').slice(0,26).padEnd(28)}${(i.date||'').padEnd(10)}${money(i.amount)}\n`;});
    t+=`${'-'.repeat(44)}\n`;
    if(taxA>0)t+=`Sales Tax:`.padEnd(38)+money(taxA)+`\n`;
    if(otherA>0)t+=`Other:`.padEnd(38)+money(otherA)+`\n`;
    t+=`TOTAL:`.padEnd(38)+money(total)+`\n`;
    t+=`${'='.repeat(44)}\n`;
    if(method)t+=`Payment Method: ${method}\n`;
    t+=`\nThank you for your business!\nPay via Zelle: +1 (917) 663-6369`;
    return t;
  };

  const copyText=()=>{navigator.clipboard.writeText(plainText());showToast('Invoice copied! Paste into text/email');};

  const exportExcel=()=>{
    const rows=[
      ['SAMS CONSTRUCTION SERVICES LTD'],
      ['188-16 Woodhull Ave, Hollis NY 11423'],
      ['Tel: +1 (917) 663-6369','','BIC# 4376'],
      [],
      ['Invoice No:',invNo||'—'],
      ['Date:',fmtDate(invDate)],
      [],
      ['Bill To:',client],
      ['Address:',addr],
      ['Phone:',phone],
      [],
      ['Description','Date','Amount'],
      ...li.map(i=>[i.desc,i.date,parseFloat(i.amount)||0]),
      [],
    ];
    if(taxA>0)rows.push(['','Sales Tax',taxA]);
    if(otherA>0)rows.push(['','Other',otherA]);
    rows.push(['','TOTAL',total]);
    if(method)rows.push([],['Payment Method:',method]);
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:30},{wch:14},{wch:14}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Invoice');
    XLSX.writeFile(wb,`Invoice_${invNo||'SAMS'}.xlsx`);
    showToast('Excel file downloaded ✓');
  };

  return (
    <div style={{maxWidth:760,margin:'0 auto'}}>
      {rentals.length>0&&<div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,padding:'14px 18px',marginBottom:20,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>

            <div><label style={lbl}>Date</label><input type="date" style={inp} value={invDate} onChange={e=>setInvDate(e.target.value)}/></div>

          <div>

              <thead><tr style={{background:'#F9FAFB'}}>{['Description','Date','Amount',''].map((h,i)=><th key={i} style={{padding:'7px 8px',textAlign:'left',fontSize:10,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',width:i===1?'130px':i===2?'110px':i===3?'30px':'auto'}}>{h}</th>)}</tr></thead>

                    <td style={{padding:4}}><input type="date" style={inp} value={item.date} onChange={e=>setItems(p=>p.map(i=>i.id===item.id?{...i,date:e.target.value}:i))}/></td>
                    <td style={{padding:4}}><input type="number" style={inp} placeholder="0.00" value={item.amount} onChange={e=>setItems(p=>p.map(i=>i.id===item.id?{...i,amount:e.target.value}:i))}/></td>
                    <td style={{padding:'4px 0 4px 4px',textAlign:'center'}}>{items.length>1&&<button onClick={()=>setItems(p=>p.filter(i=>i.id!==item.id))} style={{background:'none',border:'none',cursor:'pointer',color:'#EF4444',fontSize:16}}>×</button>}</td>
                  </tr>

              </tbody>
            </table>
            <button onClick={()=>{setItems(p=>[...p,{id:nextId,desc:'',date:'',amount:''}]);setNextId(n=>n+1);}} style={{fontSize:12,color:'#2563EB',background:'none',border:'none',cursor:'pointer',fontWeight:600,padding:'8px 0'}}>+ Add line item</button>

          </div>

          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button onClick={copyText} style={{flex:1,minWidth:160,padding:'13px',background:'#2563EB',color:'#fff',border:'none',borderRadius:9,fontSize:14,fontWeight:700,cursor:'pointer'}}>📋 Copy as Text</button>
            <button onClick={exportExcel} style={{flex:1,minWidth:160,padding:'13px',background:'#065F46',color:'#fff',border:'none',borderRadius:9,fontSize:14,fontWeight:700,cursor:'pointer'}}>📊 Export to Excel</button>

        </div>
      </div>
    </div>
  );
}

      setLoading(false);
    });

function App(){
  // Check if this is a client portal link first
  const path=window.location.hash.slice(1);
  const portalMatch=path.match(/^\/portal\/(.+)$/);
  if(portalMatch)return <ClientPortal token={portalMatch[1]}/>;
  const driverMatch=path.match(/^\/driver\/(.+)$/);
  if(driverMatch)return <DriverView name={decodeURIComponent(driverMatch[1])}/>;

  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('dashboard');
  const [rentals,setRentals]=useState([]);
  const [extensions,setExtensions]=useState([]);
  const [loading,setLoading]=useState(false);
  const [toast,setToast]=useState('');
  const [showForm,setShowForm]=useState(false);
  const [showEquip,setShowEquip]=useState(false);
  const [clientPanel,setClientPanel]=useState(null);
  const [editRental,setEditRental]=useState(null);

  useEffect(()=>{const u=localStorage.getItem('sams_user');if(u)setUser(JSON.parse(u));},[]);
  useEffect(()=>{if(user)loadData();},[user]);

  const loadData=async()=>{setLoading(true);const [{data:r},{data:e}]=await Promise.all([sb.from('rentals').select('*').order('created_at',{ascending:false}),sb.from('extension_requests').select('*').eq('status','pending')]);if(r)setRentals(r);if(e)setExtensions(e);setLoading(false);};
  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(''),3000);};
  const copyLink=(t)=>{navigator.clipboard.writeText(`${APP_URL}/#/portal/${t}`);showToast('Portal link copied!');};
  const markPaid=async(id)=>{await sb.from('rentals').update({payment_status:'paid'}).eq('id',id);showToast('Marked paid ✓');loadData();};
  const setDriverStatus=async(id,status)=>{await sb.from('rentals').update({driver_status:status}).eq('id',id);showToast('Status updated ✓');loadData();};

  const denyExt=async(id)=>{await sb.from('extension_requests').update({status:'denied'}).eq('id',id);loadData();};
  const deleteRental=async(id)=>{if(!window.confirm('Delete rental '+id+'? This cannot be undone.'))return;await sb.from('rentals').delete().eq('id',id);showToast('Rental deleted');loadData();};

  if(!user)return <Login onLogin={u=>{localStorage.setItem('sams_user',JSON.stringify(u));setUser(u);}}/>;

  const active=rentals.filter(r=>r.rental_status==='active').length;
  const overdue=rentals.filter(r=>daysUntil(r.due_date)<0&&r.payment_status!=='paid').length;
  const revenue=rentals.filter(r=>r.payment_status==='paid').reduce((s,r)=>s+r.price,0);

  return (
    <div style={{minHeight:'100vh'}}>
      {toast&&<div style={{position:'fixed',bottom:24,right:24,background:'#111827',color:'#fff',padding:'12px 20px',borderRadius:10,fontWeight:600,fontSize:14,zIndex:500,animation:'fadeIn 0.3s'}}>{toast}</div>}
      {showForm&&<NewRentalForm onSaved={()=>{setShowForm(false);loadData();showToast('Rental saved! Portal link ready.');}} onClose={()=>setShowForm(false)} showToast={showToast}/>}
      {showEquip&&<EquipmentManager onClose={()=>setShowEquip(false)} onChange={loadData} showToast={showToast}/>}
      {clientPanel&&<ClientPanel client={clientPanel} rentals={rentals} onClose={()=>setClientPanel(null)} copyLink={copyLink}/>}
      {editRental&&<EditRentalModal rental={editRental} onClose={()=>setEditRental(null)} onSaved={()=>{setEditRental(null);loadData();showToast('Rental updated ✓');}} showToast={showToast}/>}

      <header style={{background:'#fff',borderBottom:'1px solid #E5E7EB',padding:'0 20px',display:'flex',alignItems:'center',justifyContent:'space-between',height:56,position:'sticky',top:0,zIndex:100,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
          <span style={{fontSize:14,fontWeight:700}}>Sams Construction</span>
          <span style={{fontSize:10,fontWeight:600,color:'#2563EB',background:'#EFF6FF',padding:'2px 6px',borderRadius:4}}>SamsOffice</span>
          <nav style={{display:'flex',gap:2}}>
            {[{id:'dashboard',label:'Dashboard'},{id:'drivers',label:'🚛 Drivers'},{id:'collections',label:'⚖️ Collections'},{id:'invoice',label:'📄 Invoice'},{id:'map',label:'🗺 Map'},{id:'settings',label:'⚙️ Settings'}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'5px 11px',borderRadius:6,fontSize:12,fontWeight:500,cursor:'pointer',border:'none',background:tab===t.id?'#F3F4F6':'transparent',color:tab===t.id?'#111827':'#6B7280'}}>{t.label}</button>)}
          </nav>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          {overdue>0&&<span style={{padding:'4px 10px',borderRadius:20,background:'#FEF2F2',border:'1px solid #FCA5A5',fontSize:11,fontWeight:600,color:'#991B1B'}}>{overdue} overdue</span>}
          <button onClick={()=>setShowEquip(true)} style={{padding:'7px 12px',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',color:'#374151'}}>⚙ Equipment</button>
          <button onClick={()=>setShowForm(true)} style={{padding:'7px 14px',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff'}}>+ New Rental</button>
          <button onClick={()=>{localStorage.removeItem('sams_user');setUser(null);}} style={{padding:'7px 12px',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',color:'#374151'}}>Sign Out</button>
        </div>
      </header>

      <main style={{padding:'24px 20px',maxWidth:1400,margin:'0 auto'}}>
        {loading&&<div style={{textAlign:'center',padding:48}}><div className="spinner" style={{margin:'0 auto'}}/></div>}

        {!loading&&tab==='dashboard'&&<>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:16,marginBottom:22}}>
            {[{l:'Active Rentals',v:active,a:false},{l:'Overdue',v:overdue,a:overdue>0},{l:'Total Rentals',v:rentals.length,a:false},{l:'Revenue',v:money(revenue),a:false}].map((s,i)=><div key={i} style={{background:'#fff',borderRadius:10,padding:'16px 18px',border:'1px solid #F3F4F6'}}><p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF',marginBottom:6}}>{s.l}</p><p style={{fontSize:24,fontWeight:700,color:s.a?'#DC2626':'#111827'}}>{s.v}</p></div>)}
          </div>
          {extensions.length>0&&<div style={{background:'#FFFBEB',border:'1px solid #FCD34D',borderRadius:10,padding:'14px 18px',marginBottom:18}}>
            <h4 style={{fontSize:13,fontWeight:700,color:'#92400E',marginBottom:10}}>📅 Pending Extensions ({extensions.length})</h4>
            {extensions.map(ext=><div key={ext.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #FDE68A',flexWrap:'wrap',gap:8}}><span style={{fontSize:13}}><strong>{ext.client_name}</strong> — {ext.rental_id} — +{ext.extra_days}d (+{money(ext.extra_cost)})</span><div style={{display:'flex',gap:8}}><button onClick={()=>approveExt(ext)} style={{padding:'5px 12px',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:'#ECFDF5',color:'#065F46'}}>✓ Approve</button><button onClick={()=>denyExt(ext.id)} style={{padding:'5px 12px',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:'#FEF2F2',color:'#991B1B'}}>✕ Deny</button></div></div>)}
          </div>}
          <div style={{background:'#fff',borderRadius:11,overflow:'hidden',border:'1px solid #F3F4F6'}}>
            <div style={{padding:'14px 18px',borderBottom:'1px solid #F3F4F6'}}><h3 style={{fontSize:14,fontWeight:700}}>All Rentals ({rentals.length})</h3></div>
            {rentals.length===0?<div style={{padding:48,textAlign:'center',color:'#9CA3AF'}}><div style={{fontSize:32,marginBottom:8}}>📋</div>No rentals yet. Click "+ New Rental".</div>
            :<div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead><tr style={{background:'#FAFAFA'}}>{['ID','Asset','Client','Driver','Delivery','Due','Price','Pay','Actions'].map(h=><th key={h} style={{padding:'9px 12px',textAlign:'left',fontSize:10,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF',borderBottom:'1px solid #F3F4F6',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
              <tbody>{rentals.map((r,i)=>{const d=daysUntil(r.due_date);const bg=i%2===0?'#fff':'#FAFAFA';return <tr key={r.id} style={{background:bg}}>
                <td style={{padding:'10px 12px',fontSize:11,color:'#9CA3AF',borderBottom:'1px solid #F3F4F6',fontFamily:'monospace'}}>{r.id}</td>
                <td style={{padding:'10px 12px',borderBottom:'1px solid #F3F4F6'}}><div style={{fontWeight:600}}>{r.asset}</div><div style={{fontSize:10,color:'#9CA3AF'}}>{r.category}</div></td>
                <td style={{padding:'10px 12px',borderBottom:'1px solid #F3F4F6'}}><button onClick={()=>setClientPanel(r.client_name)} style={{background:'none',border:'none',padding:0,cursor:'pointer',fontWeight:600,color:'#2563EB',fontSize:13,textDecoration:'underline',textDecorationColor:'#BFDBFE'}}>{r.client_name}</button><div style={{fontSize:10,color:'#9CA3AF'}}>{r.client_phone}</div></td>
                <td style={{padding:'10px 12px',borderBottom:'1px solid #F3F4F6',fontSize:12}}>{r.assigned_driver}</td>
                <td style={{padding:'10px 12px',borderBottom:'1px solid #F3F4F6'}}><DriverBadge status={r.driver_status}/></td>
                <td style={{padding:'10px 12px',borderBottom:'1px solid #F3F4F6'}}><div style={{fontSize:11,fontFamily:'monospace'}}>{r.due_date}</div><div style={{fontSize:10,fontWeight:d<=1?600:400,color:d<0?'#DC2626':d<=2?'#D97706':'#9CA3AF'}}>{d<0?`${Math.abs(d)}d over`:d===0?'today':`${d}d left`}</div></td>
                <td style={{padding:'10px 12px',borderBottom:'1px solid #F3F4F6',fontFamily:'monospace',fontWeight:600,fontSize:12}}>{money(r.price)}</td>
                <td style={{padding:'10px 12px',borderBottom:'1px solid #F3F4F6'}}><PayBadge status={r.payment_status}/></td>
                <td style={{padding:'10px 12px',borderBottom:'1px solid #F3F4F6'}}><div style={{display:'flex',gap:5,flexWrap:'wrap'}}><button onClick={()=>copyLink(r.portal_token)} style={{padding:'4px 8px',borderRadius:5,fontSize:11,fontWeight:600,background:'#F0F7FF',color:'#2563EB',border:'1px solid #BFDBFE',cursor:'pointer',whiteSpace:'nowrap'}}>🔗 Link</button>{r.payment_status!=='paid'&&<button onClick={()=>markPaid(r.id)} style={{padding:'4px 8px',borderRadius:5,fontSize:11,fontWeight:600,background:'#ECFDF5',color:'#065F46',border:'none',cursor:'pointer'}}>✓ Paid</button>}<button onClick={()=>setEditRental(r)} style={{padding:'4px 8px',borderRadius:5,fontSize:11,fontWeight:600,background:'#FFFBEB',color:'#92400E',border:'1px solid #FDE68A',cursor:'pointer'}}>✏ Edit</button></div></td>
              </tr>;})}</tbody>
            </table></div>}
          </div>
        </>}

        {!loading&&tab==='drivers'&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:20}}>
          {WORKERS.map(driver=>{const jobs=rentals.filter(r=>r.assigned_driver===driver&&r.rental_status!=='completed');return <div key={driver} style={{background:'#fff',borderRadius:12,border:'1px solid #F3F4F6',overflow:'hidden'}}>
            <div style={{padding:'14px 18px',background:'#111827',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:32,height:32,borderRadius:'50%',background:'#374151',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#fff'}}>{driver[0]}</div><div><div style={{fontSize:14,fontWeight:700,color:'#fff'}}>{driver}</div></div></div><span style={{background:'#374151',padding:'3px 10px',borderRadius:20,fontSize:11,color:'#9CA3AF'}}>{jobs.length} job{jobs.length!==1?'s':''}</span></div>
            <div style={{padding:12}}>{jobs.length===0?<div style={{textAlign:'center',padding:20,color:'#9CA3AF',fontSize:12}}>No active jobs</div>:jobs.map(r=>{const cs=driverStep(r.driver_status);const nextStep=DRIVER_FLOW[DRIVER_FLOW.findIndex(x=>x.key===r.driver_status)+1];return <div key={r.id} style={{background:'#F9FAFB',borderRadius:8,padding:12,marginBottom:8,border:'1px solid #F3F4F6'}}>
              <div style={{fontWeight:700,marginBottom:4}}>{r.asset}</div>
              <div style={{fontSize:11,color:'#6B7280',marginBottom:8}}>{r.client_name} · {r.client_address}</div>
              <div style={{fontSize:12,fontWeight:600,color:'#1D4ED8',marginBottom:8}}>{cs.label}</div>
              {nextStep&&<button onClick={()=>setDriverStatus(r.id,nextStep.key)} style={{width:'100%',padding:'10px',borderRadius:7,fontSize:13,fontWeight:700,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff',marginBottom:8}}>Tap: {nextStep.label}</button>}
              <div style={{display:'flex',gap:6}}><a href={`tel:${(r.client_phone||'').replace(/\D/g,'')}`} style={{flex:1,padding:'8px',borderRadius:5,fontSize:11,fontWeight:600,background:'#EFF6FF',color:'#1D4ED8',textDecoration:'none',textAlign:'center'}}>📞 Call</a><a href={`https://maps.google.com?q=${encodeURIComponent(r.client_address||'')}`} target="_blank" style={{flex:1,padding:'8px',borderRadius:5,fontSize:11,fontWeight:600,background:'#ECFDF5',color:'#065F46',textDecoration:'none',textAlign:'center'}}>🗺 Map</a></div>
            </div>;})}</div>
          </div>;})}
        </div>}

        {!loading&&tab==='collections'&&<div>
          <div style={{background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:10,padding:'14px 18px',marginBottom:20}}><p style={{fontSize:14,fontWeight:700,color:'#991B1B'}}>⚖️ Total Outstanding: {money(rentals.filter(r=>r.payment_status!=='paid').reduce((s,r)=>s+r.price,0))}</p></div>
          {rentals.filter(r=>r.payment_status!=='paid').length===0?<div style={{background:'#fff',borderRadius:12,padding:48,textAlign:'center',color:'#9CA3AF',border:'1px solid #F3F4F6'}}><div style={{fontSize:32}}>✅</div>All accounts current</div>
          :rentals.filter(r=>r.payment_status!=='paid').map(r=>{const d=daysUntil(r.due_date);const od=d<0?Math.abs(d):0;const lien=`NOTICE OF INTENT TO FILE MECHANIC'S LIEN\n\nDate: ${new Date().toLocaleDateString()}\n\nTO: ${r.client_name}\n${r.client_address}\n\nFROM: ${COMPANY}\n188-16 Woodhull Ave, Hollis NY 11423\nTel: +1 (917) 663-6369\n\nRE: Unpaid invoice ${r.id} — ${money(r.price)}\nEquipment: ${r.asset}\n\n${COMPANY} intends to file a Mechanic's Lien against the property at ${r.client_address} for the unpaid amount of ${money(r.price)}.\n\nFull payment must be received within 10 days to avoid this filing.\n\nPay via Zelle: +1 (917) 663-6369\nor Check payable to: ${COMPANY}\n\n${COMPANY}`;return <div key={r.id} style={{background:'#fff',borderRadius:11,border:'1px solid #F3F4F6',padding:'16px 18px',marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
              <div><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}}><span style={{fontSize:15,fontWeight:700}}>{r.client_name}</span><span style={{fontSize:11,color:'#9CA3AF',fontFamily:'monospace'}}>{r.id}</span><span style={{fontSize:12,fontWeight:600,color:od>14?'#991B1B':od>7?'#D97706':'#374151'}}>{od>14?'⛔ Lien Stage':od>7?'🔴 Final Notice':od>0?'🟡 Overdue':'⏳ Not Due'}</span></div><div style={{fontSize:13,fontWeight:700,color:'#DC2626'}}>{money(r.price)} {od>0&&<span style={{fontWeight:400,fontSize:12}}>— {od}d overdue</span>}</div><div style={{fontSize:12,color:'#6B7280'}}>{r.asset} · {r.client_phone}</div></div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}><a href={`tel:${(r.client_phone||'').replace(/\D/g,'')}`} style={{padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,background:'#EFF6FF',color:'#1D4ED8',textDecoration:'none',border:'1px solid #BFDBFE'}}>📞 Call</a><button onClick={()=>copyLink(r.portal_token)} style={{padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,background:'#F0F7FF',color:'#2563EB',border:'1px solid #BFDBFE',cursor:'pointer'}}>🔗 Portal</button>{od>=7&&<a href={`mailto:${r.client_email}?subject=NOTICE OF INTENT TO FILE MECHANIC'S LIEN — ${r.id}&body=${encodeURIComponent(lien)}`} style={{padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,background:'#FEF2F2',color:'#991B1B',textDecoration:'none',border:'1px solid #FCA5A5'}}>⚖️ Lien Notice</a>}<button onClick={()=>markPaid(r.id)} style={{padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,background:'#ECFDF5',color:'#065F46',border:'none',cursor:'pointer'}}>✓ Paid</button></div>
            </div>
          </div>;})}
        </div>}

        {!loading&&tab==='invoice'&&<InvoiceTab rentals={rentals} showToast={showToast}/>}
        {!loading&&tab==='settings'&&<SettingsTab showToast={showToast}/>}
        {!loading&&tab==='map'&&<MapTab rentals={rentals}/>}
      </main>
    </div>
  );
}

// ── DRIVER VIEW (standalone for driver links) ──
function DriverView({name}){
  const [jobs,setJobs]=useState([]);
  const [loading,setLoading]=useState(true);
  const load=async()=>{const {data}=await sb.from('rentals').select('*').eq('assigned_driver',name).neq('rental_status','completed').order('due_date');if(data)setJobs(data);setLoading(false);};
  useEffect(()=>{load();},[]);
  const setStatus=async(id,s)=>{await sb.from('rentals').update({driver_status:s}).eq('id',id);load();};
  if(loading)return <div style={{minHeight:'100vh',background:'#111827',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="spinner"/></div>;
  return <div style={{minHeight:'100vh',background:'#F9FAFB'}}>
    <div style={{background:'#fff',padding:'20px',borderBottom:'1px solid #E5E7EB'}}><h1 style={{fontSize:22,fontWeight:700,color:'#111827'}}>👷 {name}</h1><p style={{fontSize:12,color:'#9CA3AF'}}>{jobs.length} active jobs · Sams Construction</p></div>
    <div style={{padding:16,display:'flex',flexDirection:'column',gap:14}}>
      {jobs.length===0?<div style={{textAlign:'center',padding:60,color:'#9CA3AF'}}><div style={{fontSize:48}}>✅</div>No jobs right now</div>
      :jobs.map(r=>{const cs=driverStep(r.driver_status);const next=DRIVER_FLOW[DRIVER_FLOW.findIndex(x=>x.key===r.driver_status)+1];const d=daysUntil(r.due_date);return <div key={r.id} style={{background:'#fff',borderRadius:14,overflow:'hidden',border:'1px solid #E5E7EB'}}>
        <div style={{padding:'14px 16px',borderBottom:'1px solid #E5E7EB'}}><h3 style={{fontSize:18,fontWeight:700,color:'#111827'}}>{r.asset}</h3><p style={{fontSize:14,color:'#6B7280'}}>{r.client_name}</p></div>
        <div style={{padding:'12px 16px',fontSize:13,color:'#374151',lineHeight:1.9}}><div>📍 {r.client_address}</div><div>📅 Due: {r.due_date} {d<0?`(${Math.abs(d)}d overdue)`:`(${d}d left)`}</div><div>💰 {money(r.price)} · {r.payment_status.toUpperCase()}</div></div>
        <div style={{padding:'12px 16px'}}>
          <div style={{fontSize:13,fontWeight:600,color:'#111827',marginBottom:10}}>Status: {cs.label}</div>
          {next&&<button onClick={()=>setStatus(r.id,next.key)} style={{width:'100%',padding:16,borderRadius:10,fontSize:17,fontWeight:700,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff',marginBottom:8}}>✅ Tap when: {next.label}</button>}
          {DRIVER_FLOW.findIndex(x=>x.key===r.driver_status)>0&&<button onClick={()=>{if(window.confirm('Go back one step?')){setStatus(r.id,DRIVER_FLOW[DRIVER_FLOW.findIndex(x=>x.key===r.driver_status)-1].key);}}} style={{width:'100%',padding:10,borderRadius:10,fontSize:13,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',color:'#6B7280',marginBottom:8}}>↩ Undo — Go Back One Step</button>}
          <div style={{display:'flex',gap:8,marginTop:4}}><a href={`tel:${(r.client_phone||'').replace(/\D/g,'')}`} style={{flex:1,padding:12,borderRadius:9,background:'#1D4ED8',color:'#fff',textDecoration:'none',fontSize:14,fontWeight:600,textAlign:'center'}}>📞 Call</a><a href={`https://maps.google.com?q=${encodeURIComponent(r.client_address||'')}`} target="_blank" style={{flex:1,padding:12,borderRadius:9,background:'#065F46',color:'#fff',textDecoration:'none',fontSize:14,fontWeight:600,textAlign:'center'}}>🗺 Directions</a></div>
        </div>
      </div>;})}
    </div>
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
// Re-render on hash change for portal links
window.addEventListener('hashchange',()=>root.render(<App/>));
</script>
</body>
</html>

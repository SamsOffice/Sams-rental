function daysUntil(d){return Math.ceil((new Date(d)-new Date().setHours(0,0,0,0))/86400000);}
function fmtDate(s){if(!s)return'—';return new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function money(n){return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function driverStep(s){return DRIVER_FLOW.find(x=>x.key===s)||DRIVER_FLOW[0];}
function getZelle(){return localStorage.getItem('sams_zelle')||OFFICE_PHONE;}
function getLang(){return localStorage.getItem('sams_lang')||'en';}

// ── CLIENT PORTAL ──

  const [lang,setLang]=useState('en');

  useEffect(()=>{
    sb.from('rentals').select('*').eq('portal_token',token).single().then(({data,error})=>{
      if(error||!data)setNotFound(true);else setRental(data);
      setLoading(false);
    });
  },[token]);

  if(loading)return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="spinner"/></div>;

  const es=lang==='es';

        </div>
      </div>

      <div style={{maxWidth:500,margin:'0 auto',padding:'20px 16px',display:'flex',flexDirection:'column',gap:14}}>

        {/* OVERDUE NOTICE LETTER */}
        {od>0&&!isPaid&&<div style={{background:'#7F1D1D',border:'2px solid #DC2626',borderRadius:12,padding:'18px',color:'#fff'}}>

          <div style={{fontSize:13,lineHeight:1.7,marginBottom:10}}>{es?`Su factura ${rental.id} está VENCIDA por ${od} día(s). El monto de ${money(rental.price)} debe pagarse de inmediato para evitar consecuencias.`:`Invoice ${rental.id} is OVERDUE by ${od} day(s). The amount of ${money(rental.price)} must be paid immediately to avoid the following consequences:`}</div>
          <ul style={{fontSize:12,lineHeight:2,paddingLeft:16}}>
            <li>{es?'Programación inmediata de recuperación de equipo':'Immediate equipment repossession scheduling'}</li>
            <li>{es?'Suspensión de todas las rentas activas':'Suspension of all active rentals'}</li>
            <li>{es?'Reporte a agencias de crédito comercial':'Report to commercial credit agencies (D&B/Experian)'}</li>
            <li>{es?'Presentación de Gravamen Mecánico':'Filing of Mechanic\'s Lien on your property'}</li>
            <li>{es?'Honorarios legales y de cobro':'Legal and collection fees added to balance'}</li>
          </ul>
          <div style={{marginTop:12,padding:'10px',background:'rgba(0,0,0,0.3)',borderRadius:8,fontSize:13,fontWeight:700}}>
            {es?`Llame inmediatamente: ${OFFICE_PHONE}`:`Call immediately: ${OFFICE_PHONE}`}
          </div>
        </div>}

        <div><p style={{fontSize:13,color:'#9CA3AF'}}>{es?'Estimado/a,':'Hello,'}</p><h1 style={{fontSize:22,fontWeight:700}}>{rental.client_name}</h1></div>

        {/* AMAZON-STYLE ORDER TRACKING */}
        <div style={{background:'#fff',borderRadius:12,padding:'18px',border:'1px solid #F3F4F6'}}>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:16}}>{es?'📦 Seguimiento de Pedido':'📦 Order Tracking'}</h3>
          <div style={{position:'relative',marginBottom:16}}>
            <div style={{height:6,background:'#F3F4F6',borderRadius:10}}><div style={{height:'100%',width:dStep.pct+'%',background:dStep.pct===100?'#10B981':'#2563EB',borderRadius:10,transition:'width 0.5s'}}/></div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>

                  <div style={{fontSize:13,fontWeight:current?700:400,color:current?'#2563EB':'#374151'}}>{st.label[lang]}{current&&<span style={{fontSize:11,color:'#2563EB',marginLeft:6,fontWeight:600}}>← {es?'Ahora':'Now'}</span>}</div>
                </div>
              );
            })}

        </div>

        {/* RENTAL DETAILS */}
        <div style={{background:'#fff',borderRadius:12,padding:'16px 18px',border:'1px solid #F3F4F6'}}>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>{es?'Detalles de Renta':'Rental Details'}</h3>
          {[[es?'Factura':'Invoice',rental.id],[es?'Equipo':'Equipment',rental.asset],[es?'Inicio':'Start',fmtDate(rental.start_date)],[es?'Vence':'Due',fmtDate(rental.due_date)],[es?'Duración':'Duration',rental.duration_days+(es?' días':' days')],[es?'Conductor':'Driver',rental.assigned_driver]].map(([l,v])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #F9FAFB',fontSize:13}}><span style={{color:'#9CA3AF'}}>{l}</span><span style={{fontWeight:500}}>{v}</span></div>
          ))}

        </div>

        {/* PAYMENT */}
        {!isPaid&&<div style={{background:'#fff',borderRadius:12,border:'1px solid #F3F4F6',overflow:'hidden'}}>

                  <span>{{zelle:'⚡ Zelle',check:'🏦 '+(es?'Cheque':'Check'),credit:'💳 '+(es?'Tarjeta de Crédito':'Credit Card')}[m]}</span>

// ── DRIVER VIEW ──
function DriverView({name}){
  const [jobs,setJobs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [lang,setLang]=useState('en');
  const load=async()=>{const {data}=await sb.from('rentals').select('*').eq('assigned_driver',name).neq('rental_status','completed').order('due_date');if(data)setJobs(data);setLoading(false);};
  useEffect(()=>{load();},[]);
  const setStatus=async(id,s)=>{await sb.from('rentals').update({driver_status:s}).eq('id',id);load();};
  const es=lang==='es';
  const CHECKLIST_DROPOFF=[
    {en:'Inspect equipment for pre-existing damage and document it',es:'Inspeccionar equipo por daños previos y documentarlos'},
    {en:'Confirm client name and job site address',es:'Confirmar nombre del cliente y dirección del trabajo'},
    {en:'Photograph equipment before unloading',es:'Fotografiar equipo antes de descargar'},
    {en:'Unload equipment safely at designated area',es:'Descargar equipo de forma segura en área designada'},
    {en:'Walk client through equipment operation',es:'Explicar al cliente el funcionamiento del equipo'},
    {en:'Collect signed delivery receipt from client',es:'Obtener recibo de entrega firmado por el cliente'},
    {en:'Note any issues or client concerns',es:'Anotar cualquier problema o comentario del cliente'},
  ];
  if(loading)return <div style={{minHeight:'100vh',background:'#F9FAFB',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="spinner"/></div>;
  return(
    <div style={{minHeight:'100vh',background:'#F9FAFB'}}>
      <div style={{background:'#fff',padding:'16px 20px',borderBottom:'1px solid #E5E7EB',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><h1 style={{fontSize:20,fontWeight:700}}>👷 {name}</h1><p style={{fontSize:12,color:'#9CA3AF'}}>{jobs.length} {es?'trabajos activos':'active jobs'} · Sams Construction</p></div>
        <div style={{display:'flex',gap:6}}>{['en','es'].map(l=><button key={l} onClick={()=>setLang(l)} style={{padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',border:'1px solid '+(lang===l?'#2563EB':'#E5E7EB'),background:lang===l?'#EFF6FF':'#fff',color:lang===l?'#2563EB':'#374151'}}>{l==='en'?'EN':'ES'}</button>)}</div>
      </div>
      <div style={{padding:16,display:'flex',flexDirection:'column',gap:16}}>
        {jobs.length===0?<div style={{textAlign:'center',padding:60,color:'#9CA3AF'}}><div style={{fontSize:48}}>✅</div>{es?'Sin trabajos activos':'No active jobs right now'}</div>
        :jobs.map(r=>{
          const cs=driverStep(r.driver_status);
          const csIdx=DRIVER_FLOW.findIndex(x=>x.key===r.driver_status);
          const next=DRIVER_FLOW[csIdx+1];
          const prev=DRIVER_FLOW[csIdx-1];
          const d=daysUntil(r.due_date);
          return(
            <div key={r.id} style={{background:'#fff',borderRadius:14,overflow:'hidden',border:'1px solid #E5E7EB'}}>
              <div style={{padding:'14px 16px',borderBottom:'1px solid #E5E7EB',background:'#F9FAFB'}}>
                <div style={{fontSize:18,fontWeight:700}}>{r.asset}</div>
                <div style={{fontSize:13,color:'#6B7280'}}>{r.client_name}</div>
                {r.client_tag&&<ClientTagBadge tag={r.client_tag}/>}
              </div>
              <div style={{padding:'12px 16px',fontSize:13,color:'#374151',lineHeight:2,borderBottom:'1px solid #E5E7EB'}}>
                <div>📍 {r.client_address}</div>
                <div>📅 {es?'Vence:':'Due:'} {r.due_date} {d<0?`(${Math.abs(d)}d ${es?'vencido':'overdue'})`:d===0?(es?'(hoy)':'(today)'):`(${d}d ${es?'restantes':'left'})`}</div>
                <div>💰 {money(r.price)} · {r.payment_status.toUpperCase()}</div>
                {r.notes&&<div style={{marginTop:6,padding:'8px 10px',background:'#FFFBEB',borderRadius:6,fontSize:12,color:'#92400E'}}>📝 {es?'Notas de Oficina':'Office Notes'}: {r.notes}</div>}
              </div>
              {/* Progress */}
              <div style={{padding:'12px 16px',borderBottom:'1px solid #E5E7EB'}}>
                <div style={{fontSize:12,fontWeight:600,color:'#6B7280',marginBottom:8}}>{es?'Estado Actual:':'Current Status:'} <span style={{color:'#2563EB'}}>{cs.label[lang]}</span></div>
                <div style={{height:6,background:'#F3F4F6',borderRadius:10,marginBottom:12}}><div style={{height:'100%',width:cs.pct+'%',background:cs.pct===100?'#10B981':'#2563EB',borderRadius:10}}/></div>
                {next&&<button onClick={()=>setStatus(r.id,next.key)} style={{width:'100%',padding:14,borderRadius:10,fontSize:16,fontWeight:700,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff',marginBottom:8}}>✅ {es?'Tap cuando:':'Tap when:'} {next.label[lang]}</button>}
                {prev&&<button onClick={()=>{if(window.confirm(es?'¿Regresar un paso?':'Go back one step?'))setStatus(r.id,prev.key);}} style={{width:'100%',padding:10,borderRadius:10,fontSize:13,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',color:'#6B7280'}}>↩ {es?'Deshacer — Regresar un Paso':'Undo — Go Back One Step'}</button>}
              </div>
              {/* Delivery Checklist */}
              <div style={{padding:'12px 16px',borderBottom:'1px solid #E5E7EB'}}>
                <div style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:8}}>📋 {es?'Lista de Verificación de Entrega':'Delivery Checklist'}</div>
                {CHECKLIST_DROPOFF.map((item,i)=>{
                  const [checked,setChecked]=useState(false);
                  return <div key={i} onClick={()=>setChecked(c=>!c)} style={{display:'flex',gap:8,alignItems:'flex-start',padding:'5px 0',cursor:'pointer'}}>
                    <div style={{width:18,height:18,borderRadius:4,border:'2px solid '+(checked?'#2563EB':'#D1D5DB'),background:checked?'#2563EB':'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>{checked&&<span style={{color:'#fff',fontSize:11,fontWeight:700}}>✓</span>}</div>
                    <span style={{fontSize:12,color:checked?'#9CA3AF':'#374151',textDecoration:checked?'line-through':'none',lineHeight:1.4}}>{item[lang]}</span>
                  </div>;
                })}
              </div>
              <div style={{padding:'12px 16px',display:'flex',gap:8}}>
                <a href={`tel:${(r.client_phone||'').replace(/\D/g,'')}`} style={{flex:1,padding:12,borderRadius:9,background:'#1D4ED8',color:'#fff',textDecoration:'none',fontSize:13,fontWeight:600,textAlign:'center'}}>📞 {es?'Llamar':'Call'}</a>
                <a href={`https://maps.google.com?q=${encodeURIComponent(r.client_address||'')}`} target="_blank" style={{flex:1,padding:12,borderRadius:9,background:'#065F46',color:'#fff',textDecoration:'none',fontSize:13,fontWeight:600,textAlign:'center'}}>🗺 {es?'Mapa':'Directions'}</a>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── NEW RENTAL FORM ──
function NewRentalForm({onSaved,onClose,showToast,lang,existingClients}){
  const [step,setStep]=useState(1);
  const [saving,setSaving]=useState(false);
  const [assets,setAssets]=useState([]);
  const [clientSearch,setClientSearch]=useState('');
  const [form,setForm]=useState({client_name:'',client_phone:'',client_email:'',client_address:'',client_tag:'New Client',asset:'',assigned_driver:'',start_date:'',start_time:'08:00',duration_days:'',price:'',payment_status:'unpaid',payment_method:'',notes:''});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  useEffect(()=>{sb.from('assets').select('*').order('category').order('name').then(({data})=>{if(data)setAssets(data);});},[]);
  const dueDate=()=>{if(!form.start_date||!form.duration_days)return'';const d=new Date(form.start_date);d.setDate(d.getDate()+parseInt(form.duration_days));return d.toISOString().slice(0,10);};
  const inp={width:'100%',background:'#FAFAFA',border:'1px solid #E5E7EB',borderRadius:8,padding:'10px 12px',fontSize:13,outline:'none',boxSizing:'border-box'};
  const lbl={fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF',display:'block',marginBottom:6};
  const es=lang==='es';

  const fillExisting=(c)=>{set('client_name',c.client_name);set('client_phone',c.client_phone||'');set('client_email',c.client_email||'');set('client_address',c.client_address||'');set('client_tag',c.client_tag||'New Client');setClientSearch('');};

  const save=async()=>{
    if(!form.client_name||!form.asset||!form.start_date||!form.duration_days||!form.price){showToast(es?'Complete todos los campos requeridos':'Fill all required fields');return;}
    setSaving(true);
    const cat=assets.find(a=>a.name===form.asset)?.category||'Machine';
    const {error}=await sb.from('rentals').insert({client_name:form.client_name,client_phone:form.client_phone,client_email:form.client_email,client_address:form.client_address,client_tag:form.client_tag,asset:form.asset,category:cat,assigned_driver:form.assigned_driver,start_date:form.start_date,start_time:form.start_time,due_date:dueDate(),duration_days:parseInt(form.duration_days),price:parseFloat(form.price),payment_status:form.payment_status,payment_method:form.payment_method,rental_status:'active',driver_status:'assigned',notes:form.notes});
    setSaving(false);
    if(error){showToast('Error: '+error.message);return;}
    onSaved();
  };

  const matchingClients=clientSearch.length>1?existingClients.filter(c=>c.client_name.toLowerCase().includes(clientSearch.toLowerCase())):[];

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:580,maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{padding:'18px 22px',borderBottom:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff'}}>
          <h2 style={{fontSize:16,fontWeight:700}}>{es?'Nueva Renta':'New Rental'} — {es?'Paso':'Step'} {step}/4</h2>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:'50%',border:'1px solid #E5E7EB',background:'#F9FAFB',cursor:'pointer',fontSize:16}}>×</button>
        </div>
        <div style={{padding:22}}>
          {step===1&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
            <h3 style={{fontSize:15,fontWeight:700}}>{es?'Información del Cliente':'Client Information'}</h3>
            {/* Existing client autofill */}
            <div style={{position:'relative'}}>
              <label style={lbl}>{es?'Buscar Cliente Existente':'Search Existing Client'}</label>
              <input style={inp} placeholder={es?'Escribir nombre...':'Type name to autofill...'} value={clientSearch} onChange={e=>setClientSearch(e.target.value)}/>
              {matchingClients.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid #E5E7EB',borderRadius:8,zIndex:10,boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}>
                {matchingClients.slice(0,5).map((c,i)=><div key={i} onClick={()=>fillExisting(c)} style={{padding:'10px 14px',cursor:'pointer',fontSize:13,borderBottom:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span><strong>{c.client_name}</strong> · {c.client_phone}</span>
                  {c.client_tag&&<ClientTagBadge tag={c.client_tag}/>}
                </div>)}
              </div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {[[es?'Nombre del Cliente *':'Client Name *','client_name',es?'Empresa ABC':'Stallion Construction'],[es?'Teléfono':'Phone','client_phone','(646) 000-0000'],[es?'Email':'Email','client_email','billing@co.com'],[es?'Dirección':'Address','client_address','459 Underhill Ave, Bronx']].map(([l,k,p])=>(
                <div key={k}><label style={lbl}>{l}</label><input style={inp} placeholder={p} value={form[k]} onChange={e=>set(k,e.target.value)}/></div>
              ))}
              <div style={{gridColumn:'1/-1'}}><label style={lbl}>{es?'Etiqueta del Cliente':'Client Tag'}</label>
                <select style={{...inp,cursor:'pointer'}} value={form.client_tag} onChange={e=>set('client_tag',e.target.value)}>
                  {CLIENT_TAGS.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
            </div>
          </div>}
          {step===2&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
            <h3 style={{fontSize:15,fontWeight:700}}>{es?'Equipo y Conductor':'Equipment & Driver'}</h3>
            <div><label style={lbl}>{es?'Equipo *':'Equipment *'}</label>
              <select style={{...inp,cursor:'pointer'}} value={form.asset} onChange={e=>set('asset',e.target.value)}>
                <option value="">{es?'Seleccionar...':'Select...'}</option>
                <optgroup label="Machines">{assets.filter(a=>a.category==='Machine').map(a=><option key={a.id}>{a.name}</option>)}</optgroup>
                <optgroup label="Tools">{assets.filter(a=>a.category==='Tool').map(a=><option key={a.id}>{a.name}</option>)}</optgroup>
              </select>
            </div>
            <div><label style={lbl}>{es?'Conductor':'Driver'}</label>
              <select style={{...inp,cursor:'pointer'}} value={form.assigned_driver} onChange={e=>set('assigned_driver',e.target.value)}>
                <option value="">{es?'Seleccionar conductor':'Select driver'}</option>
                {WORKERS.map(d=><option key={d}>{d}</option>)}
              </select>
            </div>
            <div><label style={lbl}>{es?'Notas para el Conductor':'Notes for Driver'}</label>
              <textarea style={{...inp,minHeight:70}} placeholder={es?'Instrucciones especiales...':'Special instructions for driver...'} value={form.notes} onChange={e=>set('notes',e.target.value)}/>
            </div>
          </div>}
          {step===3&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
            <h3 style={{fontSize:15,fontWeight:700}}>{es?'Fechas':'Timeframe'}</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div><label style={lbl}>{es?'Fecha de Inicio *':'Start Date *'}</label><input type="date" style={inp} value={form.start_date} onChange={e=>set('start_date',e.target.value)}/></div>
              <div><label style={lbl}>{es?'Hora de Inicio':'Start Time'}</label><input type="time" style={inp} value={form.start_time} onChange={e=>set('start_time',e.target.value)}/></div>
              <div><label style={lbl}>{es?'Duración (días) *':'Duration (days) *'}</label><input type="number" min="1" style={inp} placeholder="3" value={form.duration_days} onChange={e=>set('duration_days',e.target.value)}/></div>
              <div><label style={lbl}>{es?'Fecha de Vencimiento':'Due Date'}</label><div style={{...inp,background:'#F9FAFB',fontSize:12}}>{dueDate()||'—'}</div></div>
            </div>
          </div>}
          {step===4&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
            <h3 style={{fontSize:15,fontWeight:700}}>{es?'Pago':'Payment'}</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div><label style={lbl}>{es?'Precio ($) *':'Price ($) *'}</label><input type="number" style={inp} placeholder="4500" value={form.price} onChange={e=>set('price',e.target.value)}/></div>
              <div><label style={lbl}>{es?'Estado de Pago':'Payment Status'}</label>
                <select style={{...inp,cursor:'pointer'}} value={form.payment_status} onChange={e=>set('payment_status',e.target.value)}>
                  <option value="unpaid">{es?'No Pagado':'Unpaid'}</option><option value="partial">{es?'Parcial':'Partial'}</option><option value="paid">{es?'Pagado':'Paid'}</option>
                </select>
              </div>
              <div><label style={lbl}>{es?'Método de Pago':'Payment Method'}</label>
                <select style={{...inp,cursor:'pointer'}} value={form.payment_method} onChange={e=>set('payment_method',e.target.value)}>
                  <option value="">—</option>{['Cash','Check','Zelle','Credit Card'].map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
            </div>
          </div>}
        </div>
        <div style={{padding:'14px 22px',borderTop:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',position:'sticky',bottom:0,background:'#fff'}}>
          <button onClick={()=>setStep(s=>Math.max(1,s-1))} disabled={step===1} style={{padding:'8px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:step===1?'not-allowed':'pointer',border:'1px solid #E5E7EB',background:'#fff',color:step===1?'#D1D5DB':'#374151'}}>← {es?'Atrás':'Back'}</button>
          {step<4?<button onClick={()=>setStep(s=>s+1)} style={{padding:'8px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff'}}>{es?'Continuar':'Continue'} →</button>
          :<button onClick={save} disabled={saving} style={{padding:'8px 18px',borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer',border:'none',background:saving?'#9CA3AF':'#111827',color:'#fff'}}>{saving?(es?'Guardando...':'Saving...'):(es?'Guardar Renta':'Save Rental')}</button>}
        </div>
      </div>
    </div>
  );
}

// ── EDIT RENTAL MODAL ──
function EditRentalModal({rental,onClose,onSaved,showToast,lang}){
  const [form,setForm]=useState({...rental});
  const [saving,setSaving]=useState(false);
  const [assets,setAssets]=useState([]);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  useEffect(()=>{sb.from('assets').select('*').order('category').order('name').then(({data})=>{if(data)setAssets(data);});},[]);

  const lbl={fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF',display:'block',marginBottom:6};
  const es=lang==='es';

    setSaving(true);

        </div>
        <div style={{padding:22,display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div style={{gridColumn:'1/-1'}}><label style={lbl}>{es?'Nombre del Cliente':'Client Name'}</label><input style={inp} value={form.client_name||''} onChange={e=>set('client_name',e.target.value)}/></div>
            <div><label style={lbl}>{es?'Teléfono':'Phone'}</label><input style={inp} value={form.client_phone||''} onChange={e=>set('client_phone',e.target.value)}/></div>
            <div><label style={lbl}>Email</label><input style={inp} value={form.client_email||''} onChange={e=>set('client_email',e.target.value)}/></div>
            <div style={{gridColumn:'1/-1'}}><label style={lbl}>{es?'Dirección':'Address'}</label><input style={inp} value={form.client_address||''} onChange={e=>set('client_address',e.target.value)}/></div>
            <div style={{gridColumn:'1/-1'}}><label style={lbl}>{es?'Etiqueta':'Client Tag'}</label>
              <select style={{...inp,cursor:'pointer'}} value={form.client_tag||'New Client'} onChange={e=>set('client_tag',e.target.value)}>
                {CLIENT_TAGS.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div style={{gridColumn:'1/-1'}}><label style={lbl}>{es?'Equipo':'Equipment'}</label>
              <select style={{...inp,cursor:'pointer'}} value={form.asset||''} onChange={e=>set('asset',e.target.value)}>
                <optgroup label="Machines">{assets.filter(a=>a.category==='Machine').map(a=><option key={a.id}>{a.name}</option>)}</optgroup>
                <optgroup label="Tools">{assets.filter(a=>a.category==='Tool').map(a=><option key={a.id}>{a.name}</option>)}</optgroup>
              </select>
            </div>
            <div><label style={lbl}>{es?'Conductor':'Driver'}</label>
              <select style={{...inp,cursor:'pointer'}} value={form.assigned_driver||''} onChange={e=>set('assigned_driver',e.target.value)}>
                {WORKERS.map(d=><option key={d}>{d}</option>)}
              </select>
            </div>
            <div><label style={lbl}>{es?'Estado de Entrega':'Delivery Status'}</label>
              <select style={{...inp,cursor:'pointer'}} value={form.driver_status||'assigned'} onChange={e=>set('driver_status',e.target.value)}>
                {DRIVER_FLOW.map(s=><option key={s.key} value={s.key}>{s.label['en']}</option>)}
              </select>
            </div>
            <div><label style={lbl}>{es?'Fecha de Inicio':'Start Date'}</label><input type="date" style={inp} value={form.start_date||''} onChange={e=>set('start_date',e.target.value)}/></div>
            <div><label style={lbl}>{es?'Fecha de Vencimiento':'Due Date'}</label><input type="date" style={inp} value={form.due_date||''} onChange={e=>set('due_date',e.target.value)}/></div>
            <div><label style={lbl}>{es?'Precio ($)':'Price ($)'}</label><input type="number" style={inp} value={form.price||''} onChange={e=>set('price',e.target.value)}/></div>
            <div><label style={lbl}>{es?'Estado de Pago':'Payment Status'}</label>
              <select style={{...inp,cursor:'pointer'}} value={form.payment_status||'unpaid'} onChange={e=>set('payment_status',e.target.value)}>
                <option value="unpaid">{es?'No Pagado':'Unpaid'}</option><option value="partial">{es?'Parcial':'Partial'}</option><option value="paid">{es?'Pagado':'Paid'}</option>
              </select>
            </div>
            <div><label style={lbl}>{es?'Estado de Renta':'Rental Status'}</label>
              <select style={{...inp,cursor:'pointer'}} value={form.rental_status||'active'} onChange={e=>set('rental_status',e.target.value)}>
                <option value="active">{es?'Activo':'Active'}</option><option value="completed">{es?'Completado':'Completed'}</option><option value="cancelled">{es?'Cancelado':'Cancelled'}</option>
              </select>
            </div>
            <div style={{gridColumn:'1/-1'}}><label style={lbl}>{es?'Notas para Conductor':'Notes for Driver'}</label><textarea style={{...inp,minHeight:60}} value={form.notes||''} onChange={e=>set('notes',e.target.value)}/></div>
          </div>
        </div>
        <div style={{padding:'14px 22px',borderTop:'1px solid #F3F4F6',display:'flex',gap:10,position:'sticky',bottom:0,background:'#fff'}}>
          <button onClick={onClose} style={{flex:1,padding:11,borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',color:'#374151'}}>{es?'Cancelar':'Cancel'}</button>
          <button onClick={save} disabled={saving} style={{flex:2,padding:11,borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer',border:'none',background:saving?'#9CA3AF':'#111827',color:'#fff'}}>{saving?(es?'Guardando...':'Saving...'):(es?'Guardar Cambios':'Save Changes')}</button>
        </div>
      </div>
    </div>
  );
}

// ── CLIENT PANEL ──
function ClientPanel({client,rentals,onClose,copyLink,lang,showToast}){
  const h=rentals.filter(r=>r.client_name===client);
  const paid=h.filter(r=>r.payment_status==='paid').reduce((s,r)=>s+r.price,0);
  const owed=h.filter(r=>r.payment_status!=='paid').reduce((s,r)=>s+r.price,0);
  const r0=h[0];
  const es=lang==='es';
  const [tag,setTag]=useState(r0?.client_tag||'New Client');
  const updateTag=async(t)=>{setTag(t);await sb.from('rentals').update({client_tag:t}).eq('client_name',client);showToast(es?'Etiqueta actualizada':'Tag updated ✓');};
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.25)',zIndex:200}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:440,maxWidth:'100%',background:'#fff',zIndex:201,boxShadow:'-8px 0 40px rgba(0,0,0,0.12)',overflowY:'auto'}}>
        <div style={{padding:'20px 22px',borderBottom:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'flex-start',position:'sticky',top:0,background:'#fff'}}>
          <div>
            <p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF'}}>{es?'Perfil del Cliente':'Client Profile'}</p>
            <h2 style={{fontSize:18,fontWeight:700}}>{client}</h2>
            <div style={{marginTop:6}}><ClientTagBadge tag={tag}/></div>
          </div>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:'50%',border:'1px solid #E5E7EB',background:'#F9FAFB',cursor:'pointer',fontSize:15}}>×</button>
        </div>
        <div style={{padding:'16px 22px',display:'flex',flexDirection:'column',gap:14}}>
          {/* Tag selector */}
          <div>
            <p style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF',marginBottom:8}}>{es?'Estado del Cliente':'Client Status'}</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {CLIENT_TAGS.map(t=><button key={t} onClick={()=>updateTag(t)} style={{padding:'5px 10px',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',border:'2px solid '+(tag===t?'#2563EB':'#E5E7EB'),background:tag===t?'#EFF6FF':'#fff',color:tag===t?'#1D4ED8':'#374151'}}>{t}</button>)}
            </div>
          </div>
          {r0&&<div style={{background:'#F9FAFB',borderRadius:8,padding:'12px 14px',fontSize:12,lineHeight:1.9}}><div><strong style={{color:'#6B7280'}}>{es?'Teléfono':'Phone'}:</strong> {r0.client_phone||'—'}</div><div><strong style={{color:'#6B7280'}}>Email:</strong> {r0.client_email||'—'}</div><div><strong style={{color:'#6B7280'}}>{es?'Dirección':'Address'}:</strong> {r0.client_address||'—'}</div></div>}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {[{l:es?'Rentas':'Rentals',v:h.length,c:'#111827'},{l:es?'Pagado':'Paid',v:money(paid),c:'#065F46'},{l:es?'Debe':'Owed',v:money(owed),c:owed>0?'#991B1B':'#065F46'}].map(s=><div key={s.l} style={{background:'#fff',border:'1px solid #F3F4F6',borderRadius:8,padding:'10px 12px'}}><p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF',marginBottom:5}}>{s.l}</p><p style={{fontSize:16,fontWeight:700,color:s.c}}>{s.v}</p></div>)}
          </div>
          <h4 style={{fontSize:13,fontWeight:700}}>{es?`Historial (${h.length})`:`History (${h.length})`}</h4>
          {h.map(r=>(
            <div key={r.id} style={{background:'#fff',border:'1px solid #F3F4F6',borderRadius:8,padding:'12px 14px'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{fontSize:13,fontWeight:700}}>{r.asset}</span><PayBadge status={r.payment_status} lang={lang}/></div>
              <div style={{fontSize:11,color:'#6B7280',lineHeight:1.8}}>{es?'Vence:':'Due:'} {fmtDate(r.due_date)} · {money(r.price)}</div>
              <button onClick={()=>copyLink(r.portal_token)} style={{marginTop:8,padding:'4px 10px',borderRadius:5,fontSize:11,fontWeight:600,background:'#F0F7FF',color:'#2563EB',border:'1px solid #BFDBFE',cursor:'pointer'}}>🔗 {es?'Copiar Enlace Portal':'Copy Portal Link'}</button>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

// ── MAIN APP ──
function App(){
  const path=window.location.hash.slice(1);
  const portalMatch=path.match(/^\/portal\/(.+)$/);
  if(portalMatch)return <ClientPortal token={portalMatch[1]}/>;
  const driverMatch=path.match(/^\/driver\/(.+)$/);
  if(driverMatch)return <DriverView name={decodeURIComponent(driverMatch[1])}/>;

  const [user,setUser]=useState(null);
  const [lang,setLang]=useState(getLang());
  const [tab,setTab]=useState('dashboard');
  const [rentals,setRentals]=useState([]);
  const [deleted,setDeleted]=useState([]);
  const [loading,setLoading]=useState(false);
  const [toast,setToast]=useState('');
  const [showForm,setShowForm]=useState(false);
  const [showEquip,setShowEquip]=useState(false);
  const [showDeleted,setShowDeleted]=useState(false);
  const [clientPanel,setClientPanel]=useState(null);
  const [editRental,setEditRental]=useState(null);
  const [search,setSearch]=useState('');
  const t=T[lang];
  const es=lang==='es';

  useEffect(()=>{const u=localStorage.getItem('sams_user');if(u)setUser(JSON.parse(u));},[]);
  useEffect(()=>{if(user)loadData();},[user]);

  const loadData=async()=>{
    setLoading(true);
    const [{data:r},{data:d}]=await Promise.all([
      sb.from('rentals').select('*').eq('deleted',false).order('created_at',{ascending:false}),
      sb.from('rentals').select('*').eq('deleted',true).order('updated_at',{ascending:false}),
    ]);
    if(r)setRentals(r);
    if(d)setDeleted(d);
    setLoading(false);
  };

  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(''),3000);};
  const copyLink=(t)=>{navigator.clipboard.writeText(`${APP_URL}/#/portal/${t}`);showToast(es?'¡Enlace copiado!':'Portal link copied!');};
  const markPaid=async(id)=>{await sb.from('rentals').update({payment_status:'paid'}).eq('id',id);showToast(es?'Marcado como pagado ✓':'Marked paid ✓');loadData();};

  const softDelete=async(id)=>{
    if(!window.confirm(es?`¿Mover la renta ${id} a "Eliminados Recientemente"?`:`Move rental ${id} to "Recently Deleted"?`))return;
    if(!window.confirm(es?'¿Está seguro? Podrá restaurarlo desde "Eliminados Recientemente".':'Are you sure? You can restore it from "Recently Deleted".'))return;
    await sb.from('rentals').update({deleted:true}).eq('id',id);
    showToast(es?'Movido a eliminados recientemente':'Moved to recently deleted');loadData();
  };
  const restoreRental=async(id)=>{await sb.from('rentals').update({deleted:false}).eq('id',id);showToast(es?'Restaurado ✓':'Restored ✓');loadData();};
  const hardDelete=async(id)=>{
    if(!window.confirm(es?'¿Eliminar PERMANENTEMENTE? Esto no se puede deshacer.':'Delete PERMANENTLY? This cannot be undone.'))return;
    if(!window.confirm(es?'CONFIRMACIÓN FINAL: ¿Eliminar para siempre?':'FINAL CONFIRMATION: Delete forever?'))return;
    await sb.from('rentals').delete().eq('id',id);
    showToast(es?'Eliminado permanentemente':'Permanently deleted');loadData();
  };

  const setDriverStatus=async(id,status)=>{await sb.from('rentals').update({driver_status:status}).eq('id',id);showToast(es?'Estado actualizado ✓':'Status updated ✓');loadData();};

  const filteredRentals=search?rentals.filter(r=>r.client_name?.toLowerCase().includes(search.toLowerCase())||r.asset?.toLowerCase().includes(search.toLowerCase())||r.id?.toLowerCase().includes(search.toLowerCase())):rentals;
  const uniqueClients=Array.from(new Set(rentals.map(r=>r.client_name))).map(name=>rentals.find(r=>r.client_name===name));

  if(!user)return <Login onLogin={u=>{localStorage.setItem('sams_user',JSON.stringify(u));setUser(u);setLang(getLang());}}/>;

  const active=rentals.filter(r=>r.rental_status==='active').length;
  const overdue=rentals.filter(r=>daysUntil(r.due_date)<0&&r.payment_status!=='paid').length;
  const revenue=rentals.filter(r=>r.payment_status==='paid').reduce((s,r)=>s+r.price,0);

  return(
    <div style={{minHeight:'100vh'}}>
      {toast&&<div style={{position:'fixed',bottom:24,right:24,background:'#111827',color:'#fff',padding:'12px 20px',borderRadius:10,fontWeight:600,fontSize:14,zIndex:500,animation:'fadeIn 0.3s'}}>{toast}</div>}
      {showForm&&<NewRentalForm onSaved={()=>{setShowForm(false);loadData();showToast(es?'¡Renta guardada!':'Rental saved!');}} onClose={()=>setShowForm(false)} showToast={showToast} lang={lang} existingClients={uniqueClients}/>}
      {showEquip&&<EquipmentManager onClose={()=>setShowEquip(false)} onChange={loadData} showToast={showToast} lang={lang}/>}
      {clientPanel&&<ClientPanel client={clientPanel} rentals={rentals} onClose={()=>setClientPanel(null)} copyLink={copyLink} lang={lang} showToast={showToast}/>}
      {editRental&&<EditRentalModal rental={editRental} onClose={()=>setEditRental(null)} onSaved={()=>{setEditRental(null);loadData();showToast(es?'Actualizado ✓':'Updated ✓');}} showToast={showToast} lang={lang}/>}

      {/* HEADER */}
      <header style={{background:'#fff',borderBottom:'1px solid #E5E7EB',padding:'0 16px',display:'flex',alignItems:'center',justifyContent:'space-between',height:56,position:'sticky',top:0,zIndex:100,gap:8,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:14,fontWeight:700,whiteSpace:'nowrap'}}>Sams Construction</span>
          <span style={{fontSize:10,fontWeight:600,color:'#2563EB',background:'#EFF6FF',padding:'2px 6px',borderRadius:4}}>SamsOffice</span>
        </div>
        {/* Search */}
        <div style={{flex:1,maxWidth:280,position:'relative'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.searchClients} style={{width:'100%',padding:'7px 12px 7px 32px',border:'1px solid #E5E7EB',borderRadius:8,fontSize:13,outline:'none',background:'#F9FAFB'}}/>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:14,color:'#9CA3AF'}}>🔍</span>
        </div>
        <nav style={{display:'flex',gap:2,flexWrap:'wrap'}}>
          {[{id:'dashboard',label:t.dashboard},{id:'drivers',label:t.drivers},{id:'collections',label:'⚖️ '+t.collections},{id:'invoice',label:'📄 '+t.invoice},{id:'map',label:'🗺 '+t.map},{id:'settings',label:'⚙️ '+t.settings}].map(tb=><button key={tb.id} onClick={()=>setTab(tb.id)} style={{padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:500,cursor:'pointer',border:'none',background:tab===tb.id?'#F3F4F6':'transparent',color:tab===tb.id?'#111827':'#6B7280',whiteSpace:'nowrap'}}>{tb.label}</button>)}
        </nav>
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
          {overdue>0&&<span style={{padding:'3px 8px',borderRadius:20,background:'#FEF2F2',border:'1px solid #FCA5A5',fontSize:11,fontWeight:600,color:'#991B1B'}}>{overdue} {es?'vencidas':'overdue'}</span>}
          {deleted.length>0&&<button onClick={()=>setShowDeleted(s=>!s)} style={{padding:'5px 10px',borderRadius:7,fontSize:11,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',color:'#6B7280'}}>🗑 {deleted.length}</button>}
          <div style={{display:'flex',gap:4}}>{['en','es'].map(l=><button key={l} onClick={()=>{setLang(l);localStorage.setItem('sams_lang',l);}} style={{padding:'3px 8px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',border:'1px solid '+(lang===l?'#2563EB':'#E5E7EB'),background:lang===l?'#EFF6FF':'#fff',color:lang===l?'#2563EB':'#6B7280'}}>{l==='en'?'EN':'ES'}</button>)}</div>
          <button onClick={()=>setShowEquip(true)} style={{padding:'6px 10px',borderRadius:7,fontSize:11,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff'}}>⚙ {t.equipment}</button>
          <button onClick={()=>setShowForm(true)} style={{padding:'6px 12px',borderRadius:7,fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff'}}>{t.newRental}</button>
          <button onClick={()=>{localStorage.removeItem('sams_user');setUser(null);}} style={{padding:'6px 10px',borderRadius:7,fontSize:11,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff'}}>{t.signOut}</button>
        </div>
      </header>

      {/* RECENTLY DELETED PANEL */}
      {showDeleted&&deleted.length>0&&<div style={{background:'#FFFBEB',border:'1px solid #FDE68A',margin:'16px 20px',borderRadius:10,padding:'14px 18px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><h4 style={{fontSize:13,fontWeight:700,color:'#92400E'}}>🗑 {t.recentlyDeleted} ({deleted.length})</h4><button onClick={()=>setShowDeleted(false)} style={{fontSize:12,color:'#9CA3AF',background:'none',border:'none',cursor:'pointer'}}>✕</button></div>
        {deleted.map(r=><div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #FDE68A',flexWrap:'wrap',gap:8}}>
          <span style={{fontSize:13}}><strong>{r.id}</strong> — {r.client_name} — {r.asset} — {money(r.price)}</span>
          <div style={{display:'flex',gap:6}}>
            <button onClick={()=>restoreRental(r.id)} style={{padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',border:'none',background:'#ECFDF5',color:'#065F46'}}>{t.restore}</button>
            <button onClick={()=>hardDelete(r.id)} style={{padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',border:'none',background:'#FEF2F2',color:'#991B1B'}}>{t.deletePermanently}</button>
          </div>
        </div>)}
      </div>}

      <main style={{padding:'20px 16px',maxWidth:1400,margin:'0 auto'}}>
        {loading&&<div style={{textAlign:'center',padding:48}}><div className="spinner" style={{margin:'0 auto'}}/></div>}

        {/* DASHBOARD */}
        {!loading&&tab==='dashboard'&&<>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:14,marginBottom:20}}>
            {[{l:t.activeRentals,v:active,a:false},{l:t.overdue,v:overdue,a:overdue>0},{l:t.totalRentals,v:rentals.length,a:false},{l:t.revenue,v:money(revenue),a:false}].map((s,i)=><div key={i} style={{background:'#fff',borderRadius:10,padding:'14px 16px',border:'1px solid #F3F4F6'}}><p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF',marginBottom:6}}>{s.l}</p><p style={{fontSize:22,fontWeight:700,color:s.a?'#DC2626':'#111827'}}>{s.v}</p></div>)}
          </div>
          <div style={{background:'#fff',borderRadius:11,overflow:'hidden',border:'1px solid #F3F4F6'}}>
            <div style={{padding:'12px 16px',borderBottom:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <h3 style={{fontSize:14,fontWeight:700}}>{t.allRentals} ({filteredRentals.length})</h3>
              {search&&<span style={{fontSize:12,color:'#9CA3AF'}}>{es?'Filtrando:':'Filtering:'} "{search}"</span>}
            </div>
            {filteredRentals.length===0?<div style={{padding:40,textAlign:'center',color:'#9CA3AF'}}><div style={{fontSize:32}}>📋</div>{t.noRentals}</div>
            :<div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead><tr style={{background:'#FAFAFA'}}>{[t.asset,t.client,t.driver,t.delivery,t.due,t.price,t.pay,t.actions].map(h=><th key={h} style={{padding:'9px 10px',textAlign:'left',fontSize:10,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF',borderBottom:'1px solid #F3F4F6',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
              <tbody>{filteredRentals.map((r,i)=>{
                const d=daysUntil(r.due_date);const bg=i%2===0?'#fff':'#FAFAFA';
                const cs=driverStep(r.driver_status);
                const csIdx=DRIVER_FLOW.findIndex(x=>x.key===r.driver_status);
                const nextS=DRIVER_FLOW[csIdx+1];
                const prevS=DRIVER_FLOW[csIdx-1];
                return <tr key={r.id} style={{background:bg}}>
                  <td style={{padding:'10px 10px',borderBottom:'1px solid #F3F4F6'}}><div style={{fontWeight:600,fontSize:12}}>{r.asset}</div><div style={{fontSize:10,color:'#9CA3AF'}}>{r.category}</div></td>
                  <td style={{padding:'10px 10px',borderBottom:'1px solid #F3F4F6'}}>
                    <button onClick={()=>setClientPanel(r.client_name)} style={{background:'none',border:'none',padding:0,cursor:'pointer',fontWeight:600,color:'#2563EB',fontSize:13,textDecoration:'underline',textDecorationColor:'#BFDBFE'}}>{r.client_name}</button>
                    {r.client_tag&&<div><ClientTagBadge tag={r.client_tag}/></div>}
                    <div style={{fontSize:10,color:'#9CA3AF'}}>{r.client_phone}</div>
                  </td>
                  <td style={{padding:'10px 10px',borderBottom:'1px solid #F3F4F6',fontSize:12}}>{r.assigned_driver}</td>
                  <td style={{padding:'10px 10px',borderBottom:'1px solid #F3F4F6'}}>
                    <div style={{fontSize:11,fontWeight:600,color:'#1D4ED8',marginBottom:4}}>{cs.label[lang]}</div>
                    <div style={{display:'flex',gap:4}}>
                      {prevS&&<button onClick={()=>setDriverStatus(r.id,prevS.key)} style={{padding:'3px 6px',borderRadius:4,fontSize:10,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',color:'#6B7280'}}>↩</button>}

            <div style={{padding:12}}>{jobs.length===0?<div style={{textAlign:'center',padding:20,color:'#9CA3AF',fontSize:12}}>{es?'Sin trabajos activos':'No active jobs'}</div>:jobs.map(r=>{const cs=driverStep(r.driver_status);return <div key={r.id} style={{background:'#F9FAFB',borderRadius:8,padding:12,marginBottom:8,border:'1px solid #F3F4F6'}}><div style={{fontWeight:700,marginBottom:2}}>{r.asset}</div><div style={{fontSize:11,color:'#6B7280',marginBottom:4}}>{r.client_name} · {r.client_address}</div><div style={{fontSize:11,color:'#2563EB',fontWeight:600,marginBottom:8}}>{cs.label[lang]}</div><div style={{display:'flex',gap:6}}><a href={`tel:${(r.client_phone||'').replace(/\D/g,'')}`} style={{flex:1,padding:'7px',borderRadius:5,fontSize:11,fontWeight:600,background:'#EFF6FF',color:'#1D4ED8',textDecoration:'none',textAlign:'center'}}>📞</a><a href={`https://maps.google.com?q=${encodeURIComponent(r.client_address||'')}`} target="_blank" style={{flex:1,padding:'7px',borderRadius:5,fontSize:11,fontWeight:600,background:'#ECFDF5',color:'#065F46',textDecoration:'none',textAlign:'center'}}>🗺</a></div></div>;})}
            </div>
            <div style={{padding:'10px 12px',borderTop:'1px solid #F3F4F6'}}><a href={`${APP_URL}/#/driver/${encodeURIComponent(driver)}`} target="_blank" style={{display:'block',textAlign:'center',padding:'8px',borderRadius:7,fontSize:12,fontWeight:600,background:'#2563EB',color:'#fff',textDecoration:'none'}}>{es?'Abrir App del Conductor':'Open Driver App'} →</a></div>
          </div>;})}
        </div>}

        {/* COLLECTIONS TAB */}
        {!loading&&tab==='collections'&&<div>
          <div style={{background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:10,padding:'14px 18px',marginBottom:20}}><p style={{fontSize:14,fontWeight:700,color:'#991B1B'}}>⚖️ {es?'Total Pendiente:':'Total Outstanding:'} {money(rentals.filter(r=>r.payment_status!=='paid').reduce((s,r)=>s+r.price,0))}</p></div>
          {rentals.filter(r=>r.payment_status!=='paid').length===0?<div style={{background:'#fff',borderRadius:12,padding:48,textAlign:'center',color:'#9CA3AF',border:'1px solid #F3F4F6'}}><div style={{fontSize:32}}>✅</div>{es?'Todas las cuentas al corriente':'All accounts current'}</div>
          :rentals.filter(r=>r.payment_status!=='paid').map(r=>{const d=daysUntil(r.due_date);const od=d<0?Math.abs(d):0;const lienBody=`NOTICE OF INTENT TO FILE MECHANIC'S LIEN\n\nDate: ${new Date().toLocaleDateString()}\n\nTO: ${r.client_name}\n${r.client_address}\n\nFROM: Sams Construction Services LTD\n${OFFICE_ADDR}\nTel: ${OFFICE_PHONE}\n\nRE: Unpaid invoice ${r.id} — ${money(r.price)}\nEquipment: ${r.asset}\n\nSams Construction Services LTD intends to file a Mechanic's Lien against the property at ${r.client_address} for the unpaid amount of ${money(r.price)}.\n\nFull payment must be received within 10 days.\n\nPay via Zelle: ${getZelle()}\n\nSams Construction Services LTD`;
          return <div key={r.id} style={{background:'#fff',borderRadius:11,border:'1px solid #F3F4F6',padding:'16px 18px',marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
              <div><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}}><span style={{fontSize:15,fontWeight:700}}>{r.client_name}</span>{r.client_tag&&<ClientTagBadge tag={r.client_tag}/>}<span style={{fontSize:11,color:'#9CA3AF',fontFamily:'monospace'}}>{r.id}</span><span style={{fontSize:12,fontWeight:600,color:od>14?'#991B1B':od>7?'#D97706':'#374151'}}>{od>14?'⛔ Lien Stage':od>7?'🔴 Final Notice':od>0?'🟡 Overdue':'⏳ Not Due'}</span></div><div style={{fontSize:13,fontWeight:700,color:'#DC2626'}}>{money(r.price)} {od>0&&<span style={{fontWeight:400,fontSize:12}}>— {od}d {es?'vencido':'overdue'}</span>}</div><div style={{fontSize:12,color:'#6B7280'}}>{r.asset} · {r.client_phone}</div></div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}><a href={`tel:${(r.client_phone||'').replace(/\D/g,'')}`} style={{padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,background:'#EFF6FF',color:'#1D4ED8',textDecoration:'none',border:'1px solid #BFDBFE'}}>📞 {es?'Llamar':'Call'}</a><button onClick={()=>copyLink(r.portal_token)} style={{padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,background:'#F0F7FF',color:'#2563EB',border:'1px solid #BFDBFE',cursor:'pointer'}}>🔗 Portal</button>{od>=7&&<a href={`mailto:${r.client_email}?subject=NOTICE OF INTENT TO FILE MECHANIC'S LIEN — ${r.id}&body=${encodeURIComponent(lienBody)}`} style={{padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,background:'#FEF2F2',color:'#991B1B',textDecoration:'none',border:'1px solid #FCA5A5'}}>⚖️ {es?'Aviso de Gravamen':'Lien Notice'}</a>}<button onClick={()=>markPaid(r.id)} style={{padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,background:'#ECFDF5',color:'#065F46',border:'none',cursor:'pointer'}}>✓ {es?'Pagado':'Paid'}</button></div>
            </div>
          </div>;})}
        </div>}

        {!loading&&tab==='invoice'&&<InvoiceTab rentals={rentals} showToast={showToast} lang={lang}/>}
        {!loading&&tab==='map'&&<MapTab rentals={rentals} lang={lang}/>}
        {!loading&&tab==='settings'&&<SettingsTab showToast={showToast} lang={lang}/>}
      </main>
    </div>
  );
}

// ── EQUIPMENT MANAGER ──
function EquipmentManager({onClose,onChange,showToast,lang}){
  const [assets,setAssets]=useState([]);const [loading,setLoading]=useState(true);const [newName,setNewName]=useState('');const [newCat,setNewCat]=useState('Machine');const [showPresets,setShowPresets]=useState(false);const es=lang==='es';
  const load=async()=>{setLoading(true);const {data}=await sb.from('assets').select('*').order('category').order('name');if(data)setAssets(data);setLoading(false);};
  useEffect(()=>{load();},[]);
  const addAsset=async(name,cat)=>{if(!name.trim())return;if(assets.some(a=>a.name.toLowerCase()===name.trim().toLowerCase())){showToast(es?'Ya existe':'Already exists');return;}await sb.from('assets').insert({name:name.trim(),category:cat});setNewName('');await load();onChange&&onChange();showToast(es?'Equipo agregado ✓':'Equipment added ✓');};
  const removeAsset=async(id)=>{await sb.from('assets').delete().eq('id',id);await load();onChange&&onChange();showToast(es?'Eliminado':'Removed');};
  const addPreset=async(name,cat)=>{if(assets.some(a=>a.name.toLowerCase()===name.toLowerCase())){showToast(es?'Ya agregado':'Already added');return;}await sb.from('assets').insert({name,category:cat});await load();onChange&&onChange();showToast(name+' ✓');};
  const inp={background:'#FAFAFA',border:'1px solid #E5E7EB',borderRadius:8,padding:'9px 12px',fontSize:13,outline:'none'};
  const ownedNames=assets.map(a=>a.name.toLowerCase());
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:560,maxHeight:'88vh',overflowY:'auto'}}>
        <div style={{padding:'18px 22px',borderBottom:'1px solid #F3F4F6',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff'}}>
          <h2 style={{fontSize:16,fontWeight:700}}>{es?'Gestionar Equipo':'Manage Equipment'}</h2>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:'50%',border:'1px solid #E5E7EB',background:'#F9FAFB',cursor:'pointer',fontSize:16}}>×</button>
        </div>
        <div style={{padding:'18px 22px'}}>
          <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,padding:'14px',marginBottom:14}}>
            <p style={{fontSize:12,fontWeight:700,color:'#1D4ED8',marginBottom:10,textTransform:'uppercase'}}>{es?'+ Agregar Equipo Propio':'+ Add Your Own Equipment'}</p>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <input style={{...inp,flex:1,minWidth:160,background:'#fff'}} placeholder={es?'Nombre del equipo...':'Equipment name...'} value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addAsset(newName,newCat)}/>
              <select style={{...inp,cursor:'pointer',background:'#fff'}} value={newCat} onChange={e=>setNewCat(e.target.value)}><option>Machine</option><option>Tool</option></select>
              <button onClick={()=>addAsset(newName,newCat)} style={{padding:'9px 18px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff'}}>{es?'Agregar':'Add'}</button>
            </div>
          </div>
          <button onClick={()=>setShowPresets(s=>!s)} style={{width:'100%',padding:'11px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',color:'#374151',marginBottom:14,textAlign:'left',display:'flex',justifyContent:'space-between'}}>
            <span>📋 {es?'Lista de Equipo Predeterminado':'Browse Preset Equipment'} ({PRESET_EQUIPMENT.Machine.length+PRESET_EQUIPMENT.Tool.length})</span><span>{showPresets?'▲':'▼'}</span>
          </button>
          {showPresets&&<div style={{marginBottom:14,maxHeight:220,overflowY:'auto',border:'1px solid #F3F4F6',borderRadius:8,padding:12}}>
            {['Machine','Tool'].map(cat=><div key={cat} style={{marginBottom:12}}><p style={{fontSize:11,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',marginBottom:8}}>{cat}s</p><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{PRESET_EQUIPMENT[cat].map(name=>{const owned=ownedNames.includes(name.toLowerCase());return <button key={name} onClick={()=>!owned&&addPreset(name,cat)} disabled={owned} style={{padding:'5px 10px',borderRadius:20,fontSize:11,fontWeight:600,cursor:owned?'default':'pointer',border:'1px solid '+(owned?'#A7F3D0':'#E5E7EB'),background:owned?'#ECFDF5':'#fff',color:owned?'#065F46':'#374151'}}>{owned?'✓ ':'+ '}{name}</button>;})}</div></div>)}
          </div>}
          <p style={{fontSize:12,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',marginBottom:10}}>{es?'Tu Equipo':'Your Equipment'} ({assets.length})</p>
          {loading?<div style={{textAlign:'center',padding:20}}><div className="spinner" style={{margin:'0 auto'}}/></div>
          :['Machine','Tool'].map(cat=>{const items=assets.filter(a=>a.category===cat);if(items.length===0)return null;return <div key={cat} style={{marginBottom:12}}><p style={{fontSize:11,fontWeight:600,color:'#6B7280',marginBottom:6}}>{cat}s</p><div style={{display:'flex',flexDirection:'column',gap:6}}>{items.map(a=><div key={a.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',background:'#F9FAFB',borderRadius:7,border:'1px solid #F3F4F6'}}><span style={{fontSize:13}}>{a.name}</span><button onClick={()=>removeAsset(a.id)} style={{fontSize:11,color:'#EF4444',background:'none',border:'none',cursor:'pointer',fontWeight:600}}>{es?'Eliminar':'Remove'}</button></div>)}</div></div>;})}
        </div>
        <div style={{padding:'14px 22px',borderTop:'1px solid #F3F4F6',position:'sticky',bottom:0,background:'#fff'}}>
          <button onClick={onClose} style={{width:'100%',padding:'11px',borderRadius:8,fontSize:14,fontWeight:600,cursor:'pointer',border:'none',background:'#111827',color:'#fff'}}>{es?'Listo':'Done'}</button>
        </div>
      </div>
    </div>
  );
}

// ── INVOICE TAB ──
function InvoiceTab({rentals,showToast,lang}){
  const [invNo,setInvNo]=useState('');const [invDate,setInvDate]=useState(new Date().toISOString().slice(0,10));const [client,setClient]=useState('');const [addr,setAddr]=useState('');const [phone,setPhone]=useState('');const [method,setMethod]=useState('');const [items,setItems]=useState([{id:1,desc:'',date:'',amount:''},{id:2,desc:'',date:'',amount:''}]);const [nextId,setNextId]=useState(3);const [tax,setTax]=useState('');const [other,setOther]=useState('');const [prefill,setPrefill]=useState('');
  const inp={width:'100%',background:'#FAFAFA',border:'1px solid #E5E7EB',borderRadius:7,padding:'9px 11px',fontSize:13,outline:'none',boxSizing:'border-box'};
  const lbl={fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF',display:'block',marginBottom:5};
  const es=lang==='es';
  const sub=items.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);const taxA=parseFloat(tax)||0,otherA=parseFloat(other)||0,total=sub+taxA+otherA;
  const doPrefill=rid=>{setPrefill(rid);const r=rentals.find(x=>x.id===rid);if(!r)return;setInvNo(rid);setInvDate(r.start_date||'');setClient(r.client_name||'');setAddr(r.client_address||'');setPhone(r.client_phone||'');setMethod(r.payment_method||'');setItems([{id:1,desc:r.asset||'',date:r.start_date||'',amount:String(r.price||'')},{id:2,desc:'',date:'',amount:''}]);};
  const li=items.filter(i=>i.desc||i.amount);
  const plainText=()=>{let t=`SAMS CONSTRUCTION SERVICES LTD\n${OFFICE_ADDR}\nTel: ${OFFICE_PHONE}  |  BIC# 4376\n${'='.repeat(44)}\nInvoice No: ${invNo||'—'}\nDate: ${fmtDate(invDate)}\n\nBILL TO:\n${client}\n${addr}\n${phone}\n${'='.repeat(44)}\n${'DESCRIPTION'.padEnd(26)}${'DATE'.padEnd(12)}AMOUNT\n${'-'.repeat(44)}\n`;li.forEach(i=>{t+=`${(i.desc||'').slice(0,24).padEnd(26)}${(i.date||'').padEnd(12)}${money(i.amount)}\n`;});t+=`${'-'.repeat(44)}\n`;if(taxA>0)t+=`Sales Tax:`.padEnd(38)+money(taxA)+'\n';if(otherA>0)t+=`Other:`.padEnd(38)+money(otherA)+'\n';t+=`TOTAL:`.padEnd(38)+money(total)+`\n${'='.repeat(44)}\n`;if(method)t+=`Payment Method: ${method}\n`;t+=`\nPay via Zelle: ${getZelle()}\nDrop off at: ${OFFICE_ADDR}\nCall for pickup: ${OFFICE_PHONE}`;return t;};
  const copyText=()=>{navigator.clipboard.writeText(plainText());showToast(es?'¡Factura copiada!':'Invoice copied!');};
  const exportExcel=()=>{const rows=[['SAMS CONSTRUCTION SERVICES LTD'],[OFFICE_ADDR],[`Tel: ${OFFICE_PHONE}`,'','BIC# 4376'],[],[`Invoice No:`,invNo||'—'],['Date:',fmtDate(invDate)],[],[`Bill To:`,client],['Address:',addr],['Phone:',phone],[],['Description','Date','Amount'],...li.map(i=>[i.desc,i.date,parseFloat(i.amount)||0]),[]];if(taxA>0)rows.push(['','Sales Tax',taxA]);if(otherA>0)rows.push(['','Other',otherA]);rows.push(['','TOTAL',total]);if(method)rows.push([],['Payment Method:',method]);rows.push([],['Pay via Zelle:',getZelle()]);const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:32},{wch:14},{wch:14}];const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Invoice');XLSX.writeFile(wb,`Invoice_${invNo||'SAMS'}.xlsx`);showToast(es?'Excel descargado ✓':'Excel downloaded ✓');};
  return(
    <div style={{maxWidth:760,margin:'0 auto'}}>
      {rentals.length>0&&<div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,padding:'14px 18px',marginBottom:20,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}><span>⚡</span><div style={{flex:1}}><p style={{fontSize:13,fontWeight:600,color:'#1D4ED8'}}>{es?'Autocompletar desde renta':'Auto-fill from rental'}</p></div><select style={{...inp,width:'auto',minWidth:180,cursor:'pointer',background:'#fff'}} value={prefill} onChange={e=>doPrefill(e.target.value)}><option value="">{es?'Seleccionar renta...':'Select rental...'}</option>{rentals.map(r=><option key={r.id} value={r.id}>{r.id} — {r.client_name}</option>)}</select></div>}
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #F3F4F6',overflow:'hidden'}}>
        <div style={{background:'#111827',padding:'16px 22px'}}><h3 style={{fontSize:14,fontWeight:700,color:'#fff'}}>{es?'Crear Factura':'Create Invoice'}</h3></div>
        <div style={{padding:'20px 22px',display:'flex',flexDirection:'column',gap:16}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label style={lbl}>{es?'Número de Factura':'Invoice No.'}</label><input style={inp} placeholder="332" value={invNo} onChange={e=>setInvNo(e.target.value)}/></div>
            <div><label style={lbl}>{es?'Fecha':'Date'}</label><input type="date" style={inp} value={invDate} onChange={e=>setInvDate(e.target.value)}/></div>
            <div style={{gridColumn:'1/-1'}}><label style={lbl}>{es?'Cliente':'Client'}</label><input style={inp} placeholder="Stallion Construction" value={client} onChange={e=>setClient(e.target.value)}/></div>
            <div><label style={lbl}>{es?'Dirección':'Address'}</label><input style={inp} placeholder="459 Underhill Ave, Bronx" value={addr} onChange={e=>setAddr(e.target.value)}/></div>
            <div><label style={lbl}>{es?'Teléfono':'Phone'}</label><input style={inp} value={phone} onChange={e=>setPhone(e.target.value)}/></div>
          </div>
          <div><label style={lbl}>{es?'Artículos':'Line Items'}</label>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead><tr style={{background:'#F9FAFB'}}>{[es?'Descripción':'Description',es?'Fecha':'Date',es?'Monto':'Amount',''].map((h,i)=><th key={i} style={{padding:'7px 8px',textAlign:'left',fontSize:10,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',width:i===1?'130px':i===2?'110px':i===3?'30px':'auto'}}>{h}</th>)}</tr></thead>
              <tbody>{items.map(item=><tr key={item.id}><td style={{padding:'4px 4px 4px 0'}}><input style={inp} placeholder="RENT CAT 320 - 3 DAYS" value={item.desc} onChange={e=>setItems(p=>p.map(i=>i.id===item.id?{...i,desc:e.target.value}:i))}/></td><td style={{padding:4}}><input type="date" style={inp} value={item.date} onChange={e=>setItems(p=>p.map(i=>i.id===item.id?{...i,date:e.target.value}:i))}/></td><td style={{padding:4}}><input type="number" style={inp} placeholder="0.00" value={item.amount} onChange={e=>setItems(p=>p.map(i=>i.id===item.id?{...i,amount:e.target.value}:i))}/></td><td style={{padding:'4px 0 4px 4px',textAlign:'center'}}>{items.length>1&&<button onClick={()=>setItems(p=>p.filter(i=>i.id!==item.id))} style={{background:'none',border:'none',cursor:'pointer',color:'#EF4444',fontSize:16}}>×</button>}</td></tr>)}</tbody>
            </table>
            <button onClick={()=>{setItems(p=>[...p,{id:nextId,desc:'',date:'',amount:''}]);setNextId(n=>n+1);}} style={{fontSize:12,color:'#2563EB',background:'none',border:'none',cursor:'pointer',fontWeight:600,padding:'8px 0'}}>+ {es?'Agregar línea':'Add line item'}</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
            <div><label style={lbl}>{es?'Impuesto ($)':'Sales Tax ($)'}</label><input type="number" style={inp} placeholder="0.00" value={tax} onChange={e=>setTax(e.target.value)}/></div>
            <div><label style={lbl}>{es?'Otro ($)':'Other ($)'}</label><input type="number" style={inp} placeholder="0.00" value={other} onChange={e=>setOther(e.target.value)}/></div>
            <div><label style={lbl}>{es?'Método de Pago':'Payment Method'}</label><select style={{...inp,cursor:'pointer'}} value={method} onChange={e=>setMethod(e.target.value)}><option value="">—</option>{['Cash','Check','Zelle','Credit Card'].map(m=><option key={m}>{m}</option>)}</select></div>
          </div>
          <div style={{background:'#F9FAFB',borderRadius:8,border:'1px solid #F3F4F6',padding:'12px 16px',display:'flex',justifyContent:'flex-end'}}><div style={{fontSize:16,fontWeight:700}}>TOTAL: {money(total)}</div></div>
          <div><label style={lbl}>{es?'Vista Previa':'Preview (what gets copied)'}</label><pre style={{background:'#111827',color:'#E5E7EB',padding:'14px',borderRadius:8,fontSize:11,fontFamily:'monospace',overflowX:'auto',whiteSpace:'pre',lineHeight:1.5}}>{plainText()}</pre></div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button onClick={copyText} style={{flex:1,minWidth:160,padding:'13px',background:'#2563EB',color:'#fff',border:'none',borderRadius:9,fontSize:14,fontWeight:700,cursor:'pointer'}}>📋 {es?'Copiar como Texto':'Copy as Text'}</button>
            <button onClick={exportExcel} style={{flex:1,minWidth:160,padding:'13px',background:'#065F46',color:'#fff',border:'none',borderRadius:9,fontSize:14,fontWeight:700,cursor:'pointer'}}>📊 {es?'Exportar a Excel':'Export to Excel'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MAP TAB ──
function MapTab({rentals,lang}){
  const es=lang==='es';
  const active=rentals.filter(r=>r.rental_status==='active'&&r.client_address);
  const officeAddr=encodeURIComponent(OFFICE_ADDR);
  const [routeDriver,setRouteDriver]=useState('');
  const driverJobs=routeDriver?active.filter(r=>r.assigned_driver===routeDriver):[];
  const routeUrl=driverJobs.length>0?`https://www.google.com/maps/dir/${officeAddr}/${driverJobs.map(r=>encodeURIComponent(r.client_address)).join('/')}`:null;
  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12}}>
        {active.length===0?<div style={{background:'#fff',borderRadius:12,padding:32,textAlign:'center',color:'#9CA3AF',border:'1px solid #F3F4F6',gridColumn:'1/-1'}}>{es?'Sin trabajos activos con direcciones':'No active jobs with addresses'}</div>
        :active.map(r=><div key={r.id} style={{background:'#fff',borderRadius:10,border:'1px solid #F3F4F6',padding:'14px'}}>
          <div style={{fontSize:11,fontFamily:'monospace',color:'#9CA3AF',marginBottom:4}}>{r.id}</div>
          <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{r.client_name}</div>
          <div style={{fontSize:11,color:'#6B7280',marginBottom:8}}>📍 {r.client_address}</div>
          <div style={{display:'flex',gap:6}}>
            <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.client_address)}`} target="_blank" style={{flex:1,padding:'7px',borderRadius:6,fontSize:11,fontWeight:600,background:'#EFF6FF',color:'#1D4ED8',textDecoration:'none',textAlign:'center'}}>📍 {es?'Ver':'View'}</a>
            <a href={`https://www.google.com/maps/dir/${officeAddr}/${encodeURIComponent(r.client_address)}`} target="_blank" style={{flex:1,padding:'7px',borderRadius:6,fontSize:11,fontWeight:600,background:'#ECFDF5',color:'#065F46',textDecoration:'none',textAlign:'center'}}>🚛 {es?'Ruta':'Route'}</a>
          </div>
        </div>)}
      </div>
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #F3F4F6',padding:'18px'}}>
        <h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>🚛 {es?'Planificador de Rutas':'Driver Route Planner'}</h3>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          {['','Sams','Gustavo','Jose Luis'].map(d=><button key={d} onClick={()=>setRouteDriver(d)} style={{padding:'8px 14px',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',border:'2px solid '+(routeDriver===d?'#2563EB':'#E5E7EB'),background:routeDriver===d?'#EFF6FF':'#fff',color:routeDriver===d?'#1D4ED8':'#374151'}}>{d||es?'Todos':'All'}</button>)}
        </div>
        {routeDriver&&driverJobs.length>0&&<>
          <div style={{background:'#F0F7FF',borderRadius:8,padding:'12px 14px',marginBottom:12}}>{driverJobs.map((r,i)=><div key={r.id} style={{fontSize:12,padding:'4px 0',borderBottom:'1px solid #BFDBFE'}}><strong>{es?'Parada':'Stop'} {i+1}:</strong> {r.client_name} — {r.client_address}</div>)}</div>
          <a href={routeUrl} target="_blank" style={{display:'block',padding:'13px',borderRadius:9,background:'#2563EB',color:'#fff',textDecoration:'none',fontSize:14,fontWeight:700,textAlign:'center'}}>🗺 {es?'Abrir Ruta en Google Maps':'Open Full Route in Google Maps'}</a>
        </>}
        {routeDriver&&driverJobs.length===0&&<div style={{padding:16,background:'#F9FAFB',borderRadius:8,fontSize:13,color:'#9CA3AF',textAlign:'center'}}>{es?'Sin trabajos activos para':'No active jobs for'} {routeDriver}</div>}
      </div>
      {active.length>0&&<a href={`https://www.google.com/maps/search/${active.map(r=>encodeURIComponent(r.client_address)).join('/')}`} target="_blank" style={{display:'block',padding:'13px',borderRadius:9,background:'#111827',color:'#fff',textDecoration:'none',fontSize:14,fontWeight:700,textAlign:'center'}}>🗺 {es?'Ver Todos los Trabajos en Google Maps':'View All Jobs in Google Maps'}</a>}
    </div>
  );
}

// ── SETTINGS TAB ──
function SettingsTab({showToast,lang}){
  const [zelle,setZelle]=useState(localStorage.getItem('sams_zelle')||OFFICE_PHONE);const [saved,setSaved]=useState(false);const es=lang==='es';
  const inp={width:'100%',background:'#FAFAFA',border:'1px solid #E5E7EB',borderRadius:8,padding:'10px 12px',fontSize:14,outline:'none',boxSizing:'border-box'};
  const lbl={fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#9CA3AF',display:'block',marginBottom:6};
  const save=()=>{localStorage.setItem('sams_zelle',zelle);showToast(es?'Número Zelle actualizado ✓':'Zelle number updated ✓');setSaved(true);setTimeout(()=>setSaved(false),3000);};
  return(
    <div style={{maxWidth:560,margin:'0 auto',display:'flex',flexDirection:'column',gap:16}}>
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #F3F4F6',overflow:'hidden'}}>
        <div style={{background:'#111827',padding:'16px 22px'}}><h3 style={{fontSize:14,fontWeight:700,color:'#fff'}}>⚙️ {es?'Ajustes':'Settings'}</h3></div>
        <div style={{padding:22,display:'flex',flexDirection:'column',gap:16}}>
          <div style={{background:'#F0F7FF',border:'1px solid #BFDBFE',borderRadius:10,padding:'16px'}}>
            <h4 style={{fontSize:14,fontWeight:700,color:'#1D4ED8',marginBottom:4}}>💳 {es?'Número Zelle':'Zelle Number'}</h4>
            <p style={{fontSize:12,color:'#6B7280',marginBottom:12}}>{es?'Este número aparece en el portal del cliente.':'This is what clients see on their portal.'}</p>
            <label style={lbl}>{es?'Número Actual':'Current Number'}</label>
            <div style={{display:'flex',gap:8}}><input style={{...inp,flex:1}} value={zelle} onChange={e=>setZelle(e.target.value)}/><button onClick={save} style={{padding:'10px 20px',borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer',border:'none',background:'#2563EB',color:'#fff',whiteSpace:'nowrap'}}>{saved?'✓':es?'Guardar':'Save'}</button></div>
          </div>
          <div style={{background:'#F9FAFB',border:'1px solid #F3F4F6',borderRadius:10,padding:'16px'}}>
            <h4 style={{fontSize:14,fontWeight:700,marginBottom:12}}>🚛 {es?'Enlaces de Conductores':'Driver Links'}</h4>
            {WORKERS.map(driver=>{const link=`${APP_URL}/#/driver/${encodeURIComponent(driver)}`;return <div key={driver} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:'#fff',borderRadius:8,border:'1px solid #E5E7EB',marginBottom:8,gap:10,flexWrap:'wrap'}}><div><div style={{fontSize:13,fontWeight:700}}>{driver}</div><div style={{fontSize:11,color:'#9CA3AF',wordBreak:'break-all'}}>{link}</div></div><button onClick={()=>{navigator.clipboard.writeText(link);showToast(driver+(es?': enlace copiado':" link copied"));}} style={{padding:'6px 12px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB',background:'#fff',whiteSpace:'nowrap'}}>📋 {es?'Copiar':'Copy'}</button></div>;})}
          </div>
          <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:10,padding:'16px'}}>
            <h4 style={{fontSize:14,fontWeight:700,color:'#92400E',marginBottom:8}}>🔐 {es?'Información de Acceso':'Login Info'}</h4>
            <p style={{fontSize:12,color:'#6B7280'}}>Username: <strong>samsoffice2020</strong><br/>{es?'Para restablecer contraseña contacte:':'To reset password contact:'} {OFFICE_EMAIL}</p>
          </div>
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
window.addEventListener('hashchange',()=>root.render(<App/>));
</script>
</body>
</html>
